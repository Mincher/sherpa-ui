<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>sherpa-node — Component Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Manrope:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Token cascade (primitives + aliases + fonts + status). Required so
         every --sherpa-* reference inside the theme file resolves. Without
         this, light-dark() gets undefined args and component backgrounds /
         borders silently fall back to transparent. -->
    <link rel="stylesheet" href="/css/styles/index.css" />
    <link rel="stylesheet" href="/css/styles/sherpa-theme-apex-2-core.css" />
    <style>
      html, body { margin: 0; height: 100%; }
      body {
        font-family: "Open Sans", system-ui, sans-serif;
        background: var(--sherpa-surface-app-product-bg-default, #eef0f3);
        color: var(--sherpa-text-default-body, #222);
        display: grid;
        grid-template-rows: auto 1fr auto;
      }
      .topbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 16px;
        background: var(--sherpa-surface-container-default, #fff);
        border-bottom: 1px solid var(--sherpa-border-container-default, #e0e0e0);
      }
      .topbar sherpa-view-header { flex: 1 1 auto; min-width: 0; }
      .theme-toggle {
        all: unset;
        flex: 0 0 auto;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 4px;
        background: var(--sherpa-surface-container-default);
        border: 1px solid var(--sherpa-border-container-default);
        color: var(--sherpa-text-default-body);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .theme-toggle:hover { border-color: var(--sherpa-border-container-strong-default); }

      main {
        position: relative;
        min-height: 0;
        display: grid;
        grid-template-columns: 240px 1fr 360px;
      }
      .palette {
        overflow: auto;
        background: var(--sherpa-surface-container-default, #fff);
        border-right: 1px solid var(--sherpa-border-container-default, #e0e0e0);
        padding: 12px 0;
        font-size: 13px;
      }
      .palette h2 {
        margin: 0;
        padding: 8px 16px 4px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--sherpa-text-default-secondary, #666);
      }
      .palette .group {
        margin-bottom: 8px;
      }
      .palette .item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 16px;
        cursor: grab;
        user-select: none;
        color: var(--sherpa-text-default-body);
        border-left: 3px solid transparent;
      }
      .palette .item:hover {
        background: var(--sherpa-surface-container-hover, #f3f4f6);
        border-left-color: var(--sherpa-border-context-info-default, #2563eb);
      }
      .palette .item:active { cursor: grabbing; }
      .palette .item[data-disabled] {
        opacity: 0.4;
        cursor: not-allowed;
        pointer-events: none;
      }
      .palette .item .swatch {
        width: 8px; height: 8px; border-radius: 999px; flex: 0 0 auto;
        background: var(--swatch, #888);
      }
      .canvas-wrap { position: relative; min-width: 0; min-height: 0; }
      sherpa-node-canvas { position: absolute; inset: 0; }
      .drop-hint {
        position: absolute;
        inset: 0;
        pointer-events: none;
        border: 2px dashed var(--sherpa-border-context-info-default, #2563eb);
        border-radius: 4px;
        opacity: 0;
        transition: opacity 120ms ease;
      }
      .canvas-wrap[data-dropping] .drop-hint { opacity: 0.6; }

      .json-panel {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        background: var(--sherpa-surface-container-default, #fff);
        border-left: 1px solid var(--sherpa-border-container-default, #e0e0e0);
      }
      .json-panel header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--sherpa-border-container-default, #e0e0e0);
        font-size: 13px;
        font-weight: 600;
        color: var(--sherpa-text-default-body);
      }
      .json-panel .copy-btn {
        all: unset;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 4px;
        background: var(--sherpa-surface-container-default);
        border: 1px solid var(--sherpa-border-container-default);
        color: var(--sherpa-text-default-body);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .json-panel .copy-btn:hover { border-color: var(--sherpa-border-container-strong-default); }
      .json-panel pre {
        margin: 0;
        padding: 12px;
        flex: 1 1 auto;
        overflow: auto;
        font-family: "Source Code Pro", ui-monospace, monospace;
        font-size: 11.5px;
        line-height: 1.45;
        color: var(--sherpa-text-default-body);
        white-space: pre;
        tab-size: 2;
      }

      footer {
        max-height: 160px;
        overflow: auto;
        padding: 12px 24px;
        background: var(--sherpa-surface-container-default, #fff);
        border-top: 1px solid var(--sherpa-border-container-default, #e0e0e0);
        font-family: "Source Code Pro", monospace;
        font-size: 12px;
      }
      footer h3 { margin: 0 0 8px; font-family: "Open Sans"; font-size: 13px; }
      .log-line { white-space: pre; }
      .log-line.evt { color: var(--sherpa-text-context-info-default, #2563eb); }
      .log-line.del { color: var(--sherpa-text-context-error-default, #c2410c); }
    </style>
  </head>
  <body>
    <div class="topbar" id="topbar">
      <sherpa-view-header
        id="view-header"
        data-label="Node Editor Demo"
        data-export-title="Node Editor Demo">
        <sherpa-input-select
          slot="view-selection"
          id="sample-picker"
          data-layout="inline"
          aria-label="Choose a sample graph"></sherpa-input-select>
      </sherpa-view-header>
      <button class="theme-toggle" type="button" id="theme-toggle" aria-label="Toggle colour scheme">
        <i class="fa-solid fa-circle-half-stroke" aria-hidden="true"></i>
        <span id="theme-toggle-label">Auto</span>
      </button>
    </div>
    <main>
      <aside class="palette" id="palette" aria-label="Node palette"></aside>
      <div class="canvas-wrap" id="canvas-wrap">
        <sherpa-node-canvas id="canvas"></sherpa-node-canvas>
        <div class="drop-hint" aria-hidden="true"></div>
      </div>
      <aside class="json-panel" aria-label="Graph JSON">
        <header>
          <span>Graph JSON</span>
          <button type="button" class="copy-btn" id="json-copy">
            <i class="fa-regular fa-copy" aria-hidden="true"></i>
            <span id="json-copy-label">Copy</span>
          </button>
        </header>
        <pre id="json-out" aria-live="polite">{}</pre>
      </aside>
    </main>
    <footer>
      <h3>Event log</h3>
      <div id="log"></div>
    </footer>

    <script type="module">
      import "../../components/index.js";
      import {
        configureNode,
        getSubtypesForKind,
      } from "../../components/sherpa-node/sherpa-node-templates.js";

      const canvas      = document.getElementById("canvas");
      const canvasWrap  = document.getElementById("canvas-wrap");
      const palette     = document.getElementById("palette");
      const samplePicker= document.getElementById("sample-picker");
      const log         = document.getElementById("log");
      const topbar      = document.getElementById("topbar");
      const viewHeader  = document.getElementById("view-header");
      const jsonOut     = document.getElementById("json-out");
      const jsonCopy    = document.getElementById("json-copy");
      const jsonCopyLabel = document.getElementById("json-copy-label");
      const DEFAULT_HEADING = "Node Editor Demo";

      // ── JSON panel refresh (rAF-throttled) ────────────────────────
      let jsonRafId = 0;
      function refreshJSON() {
        if (jsonRafId) return;
        jsonRafId = requestAnimationFrame(() => {
          jsonRafId = 0;
          try {
            jsonOut.textContent = JSON.stringify(serialiseLogic(), null, 2);
          } catch (err) {
            jsonOut.textContent = `// serialisation error: ${err.message}`;
          }
        });
      }
      jsonCopy.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(jsonOut.textContent);
          jsonCopyLabel.textContent = "Copied";
          setTimeout(() => { jsonCopyLabel.textContent = "Copy"; }, 1200);
        } catch {
          jsonCopyLabel.textContent = "Failed";
          setTimeout(() => { jsonCopyLabel.textContent = "Copy"; }, 1200);
        }
      });

      // ── Theme toggle: cycle auto → light → dark ───────────────────
      const themeToggle = document.getElementById("theme-toggle");
      const themeLabel  = document.getElementById("theme-toggle-label");
      const THEME_KEY   = "sherpa-node-demo-theme";
      const themes      = ["light dark", "light", "dark"];
      const labels      = { "light dark": "Auto", "light": "Light", "dark": "Dark" };
      const stored      = localStorage.getItem(THEME_KEY);
      let themeIdx      = Math.max(0, themes.indexOf(stored));
      const applyTheme  = () => {
        const t = themes[themeIdx];
        document.documentElement.style.colorScheme = t;
        themeLabel.textContent = labels[t];
        localStorage.setItem(THEME_KEY, t);
      };
      applyTheme();
      themeToggle.addEventListener("click", () => {
        themeIdx = (themeIdx + 1) % themes.length;
        applyTheme();
      });

      const logLine = (cls, msg) => {
        const div = document.createElement("div");
        div.className = "log-line " + cls;
        div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        log.prepend(div);
        while (log.children.length > 80) log.lastChild.remove();
      };

      // ── Kinds & swatch colours (match --sherpa-node-accent-*) ─────
      const KINDS = [
        "source", "variable", "math", "logic",
        "time", "collection", "util", "group", "output",
      ];
      const KIND_LABELS = {
        source: "Source", variable: "Variable", math: "Math",
        logic: "Logic", time: "Time", collection: "Collection",
        util: "Utility", group: "Group", output: "Output",
      };
      const KIND_SWATCHES = {
        source:     "var(--sherpa-node-accent-source, #6366f1)",
        variable:   "var(--sherpa-node-accent-variable, #8b5cf6)",
        math:       "var(--sherpa-node-accent-math, #06b6d4)",
        logic:      "var(--sherpa-node-accent-logic, #f59e0b)",
        time:       "var(--sherpa-node-accent-time, #14b8a6)",
        collection: "var(--sherpa-node-accent-collection, #ec4899)",
        util:       "var(--sherpa-node-accent-util, #84cc16)",
        group:      "var(--sherpa-node-accent-group, #64748b)",
        output:     "var(--sherpa-node-accent-output, #22c55e)",
      };

      let nodeIdCounter = 1;
      const nextId = (kind) => `${kind}-${nodeIdCounter++}`;

      // Lookup of kind -> [{value,label},…] populated once.
      const SUBTYPES_BY_KIND = {};

      // ── Build the palette ─────────────────────────────────────────
      async function buildPalette() {
        for (const kind of KINDS) {
          const subtypes = await getSubtypesForKind(kind);
          SUBTYPES_BY_KIND[kind] = subtypes;
          if (!subtypes.length) continue;

          const group = document.createElement("div");
          group.className = "group";
          const h = document.createElement("h2");
          h.textContent = KIND_LABELS[kind] || kind;
          group.appendChild(h);

          for (const st of subtypes) {
            const row = document.createElement("div");
            row.className = "item";
            row.draggable = true;
            row.dataset.kind = kind;
            row.dataset.subtype = st.value;
            row.style.setProperty("--swatch", KIND_SWATCHES[kind]);
            row.innerHTML = `<span class="swatch"></span><span>${st.label}</span>`;
            row.addEventListener("dragstart", (e) => {
              e.dataTransfer.effectAllowed = "copy";
              // Both formats — text/plain for cross-browser, JSON for us.
              const payload = JSON.stringify({ kind, subtype: st.value });
              e.dataTransfer.setData("application/x-sherpa-node", payload);
              e.dataTransfer.setData("text/plain", payload);
            });
            group.appendChild(row);
          }
          palette.appendChild(group);
        }
      }

      // ── Drop target on the canvas ─────────────────────────────────
      canvasWrap.addEventListener("dragover", (e) => {
        // Only accept our own drags.
        if (![...e.dataTransfer.types].some(
          (t) => t === "application/x-sherpa-node" || t === "text/plain"
        )) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = "copy";
        canvasWrap.dataset.dropping = "true";
      });
      canvasWrap.addEventListener("dragleave", (e) => {
        if (e.target === canvasWrap) delete canvasWrap.dataset.dropping;
      });
      canvasWrap.addEventListener("drop", async (e) => {
        delete canvasWrap.dataset.dropping;
        const raw = e.dataTransfer.getData("application/x-sherpa-node")
                 || e.dataTransfer.getData("text/plain");
        if (!raw) return;
        let payload;
        try { payload = JSON.parse(raw); } catch { return; }
        if (!payload?.kind) return;
        e.preventDefault();
        // Inside a group sub-graph the Trigger and Output boundary
        // nodes are fixed — they represent the parent group's input /
        // output sockets. New ones cannot be added.
        if (drillStack.length && (payload.kind === "source" || payload.kind === "output")) {
          logLine("evt", `✕ ${payload.kind} nodes are fixed inside a sub-graph`);
          return;
        }
        const { x, y } = canvas.screenToWorld(e.clientX, e.clientY);
        await addNode(payload.kind, payload.subtype, x, y);
        logLine("evt", `+ node ${payload.kind}/${payload.subtype} @ (${Math.round(x)}, ${Math.round(y)})`);
      });

      async function addNode(kind, subtype, x, y) {
        const id = nextId(kind);
        const node = document.createElement("sherpa-node");
        node.dataset.nodeId = id;
        node.dataset.x = String(Math.round(x));
        node.dataset.y = String(Math.round(y));
        canvas.appendChild(node);
        await configureNode(node, kind, subtype);
        return node;
      }

      // ── Sample graphs ─────────────────────────────────────────────
      const SAMPLES = {
        empty: {
          label: "Empty canvas",
          async build() { /* nothing */ },
        },
        catalogue: {
          label: "Full sub-type catalogue",
          async build() {
            const COL_W = 360;
            const ROW_H = 380;
            for (let col = 0; col < KINDS.length; col++) {
              const kind = KINDS[col];
              const subs = SUBTYPES_BY_KIND[kind] || [];
              for (let row = 0; row < subs.length; row++) {
                await addNode(kind, subs[row].value, 60 + col * COL_W, 60 + row * ROW_H);
              }
            }
            await new Promise(r => requestAnimationFrame(r));
            // Wire up a few demo edges.
            const variables = [...canvas.querySelectorAll('sherpa-node[data-kind="variable"]')];
            const mathAdd   = canvas.querySelector('sherpa-node[data-kind="math"][data-subtype="add"]');
            const compareAnd= canvas.querySelector('sherpa-node[data-kind="logic"][data-subtype="and"]');
            const mathFloor = canvas.querySelector('sherpa-node[data-kind="math"][data-subtype="floor"]');
            const groupNode = canvas.querySelector('sherpa-node[data-kind="group"]');
            const outNode   = canvas.querySelector('sherpa-node[data-kind="output"]');
            const edges = [];
            const numVars = variables.filter(v => v.dataset.subtype === "number");
            if (numVars[0] && mathAdd) edges.push({
              from: { nodeId: numVars[0].dataset.nodeId, portName: "value" },
              to:   { nodeId: mathAdd.dataset.nodeId,   portName: "a" },
            });
            if (numVars[1] && mathAdd) edges.push({
              from: { nodeId: numVars[1].dataset.nodeId, portName: "value" },
              to:   { nodeId: mathAdd.dataset.nodeId,   portName: "b" },
            });
            if (compareAnd) {
              for (const v of numVars.slice(0, 3)) edges.push({
                from: { nodeId: v.dataset.nodeId, portName: "value" },
                to:   { nodeId: compareAnd.dataset.nodeId, portName: "in" },
              });
            }
            if (mathFloor) {
              for (const v of numVars.slice(0, 2)) edges.push({
                from: { nodeId: v.dataset.nodeId, portName: "value" },
                to:   { nodeId: mathFloor.dataset.nodeId, portName: "in" },
              });
            }
            if (groupNode && outNode) edges.push({
              from: { nodeId: groupNode.dataset.nodeId, portName: "out" },
              to:   { nodeId: outNode.dataset.nodeId, portName: "in" },
            });
            canvas.setEdges(edges);
          },
        },
        "math-pipeline": {
          label: "Math pipeline (a + b) / 2",
          async build() {
            const trig   = await addNode("source",   "trigger", 60,   120);
            const prop   = await addNode("variable", "property", 400,  60);
            const cmpAnd = await addNode("logic",    "and",     1080, 60);
            const out    = await addNode("output",   "default", 1500, 280);
            const n7     = await addNode("variable", "number",  60,   400);
            const add    = await addNode("math",     "add",     400,  400);
            const div    = await addNode("math",     "divide",  740,  400);
            const cmpGt  = await addNode("logic",    "gt",      1080, 460);
            const n3     = await addNode("variable", "number",  60,   720);
            const n2     = await addNode("variable", "number",  400,  720);
            await new Promise(r => requestAnimationFrame(r));
            // Set control values to match the saved pipeline.
            const setCtrl = (n, name, v) => {
              const inp = n.querySelector(`[slot="control"][name="${name}"]`);
              if (inp) inp.setAttribute("value", String(v));
            };
            setCtrl(n7,    "value",    7);
            setCtrl(n3,    "value",    3);
            setCtrl(n2,    "value",    2);
            setCtrl(add,   "a",        7);
            setCtrl(add,   "b",        3);
            setCtrl(div,   "a",       10);
            setCtrl(div,   "b",        2);
            setCtrl(cmpGt, "a",        5);
            setCtrl(cmpGt, "b",        3);
            setCtrl(prop,  "category", "Asset");
            setCtrl(prop,  "field",    "Name");
            canvas.setEdges([
              // Control flow
              { from: { nodeId: trig.dataset.nodeId,   portName: "out"   }, to: { nodeId: prop.dataset.nodeId,   portName: "in" }, control: true },
              // Property feeds the AND compare
              { from: { nodeId: prop.dataset.nodeId,   portName: "out"   }, to: { nodeId: cmpAnd.dataset.nodeId, portName: "in" } },
              // Numeric pipeline: (7 + 3) / 2
              { from: { nodeId: n7.dataset.nodeId,     portName: "value" }, to: { nodeId: add.dataset.nodeId,    portName: "a"  } },
              { from: { nodeId: n3.dataset.nodeId,    portName: "value" }, to: { nodeId: add.dataset.nodeId,    portName: "b"  } },
              { from: { nodeId: add.dataset.nodeId,    portName: "out"   }, to: { nodeId: div.dataset.nodeId,    portName: "a"  } },
              { from: { nodeId: n2.dataset.nodeId,     portName: "value" }, to: { nodeId: div.dataset.nodeId,    portName: "b"  } },
              // Result feeds Greater-than's A; B stays the constant 3
              { from: { nodeId: div.dataset.nodeId,    portName: "out"   }, to: { nodeId: cmpGt.dataset.nodeId,  portName: "a"  } },
              // GT true output joins the AND compare
              { from: { nodeId: cmpGt.dataset.nodeId,  portName: "true"  }, to: { nodeId: cmpAnd.dataset.nodeId, portName: "in" } },
              // AND true output drives the Output node
              { from: { nodeId: cmpAnd.dataset.nodeId, portName: "true"  }, to: { nodeId: out.dataset.nodeId,    portName: "in" } },
            ]);
          },
        },
        "logic-branch": {
          label: "Logic branch (AND with status outputs)",
          async build() {
            const trig = await addNode("source",   "trigger", 60,   180);
            const v1   = await addNode("variable", "number",  60,   460);
            const v2   = await addNode("variable", "number",  60,   780);
            const cmp  = await addNode("logic",    "and",     520,  500);
            const ok   = await addNode("output",   "default", 1020, 320);
            const bad  = await addNode("output",   "default", 1020, 700);
            await new Promise(r => requestAnimationFrame(r));
            canvas.setEdges([
              { from: { nodeId: trig.dataset.nodeId, portName: "out"   }, to: { nodeId: cmp.dataset.nodeId, portName: "in" }, control: true },
              { from: { nodeId: v1.dataset.nodeId,   portName: "value" }, to: { nodeId: cmp.dataset.nodeId, portName: "in" } },
              { from: { nodeId: v2.dataset.nodeId,   portName: "value" }, to: { nodeId: cmp.dataset.nodeId, portName: "in" } },
              { from: { nodeId: cmp.dataset.nodeId,  portName: "true"  }, to: { nodeId: ok.dataset.nodeId,  portName: "in" } },
              { from: { nodeId: cmp.dataset.nodeId,  portName: "false" }, to: { nodeId: bad.dataset.nodeId, portName: "in" } },
            ]);
          },
        },
        "with-group": {
          label: "Group node (drill-down demo)",
          async build() {
            const trig = await addNode("source",   "trigger", 60,   200);
            const v    = await addNode("variable", "text",    60,   480);
            const grp  = await addNode("group",    "default", 520,  340);
            const out  = await addNode("output",   "default", 980,  340);
            await new Promise(r => requestAnimationFrame(r));
            canvas.setEdges([
              { from: { nodeId: trig.dataset.nodeId, portName: "out"   }, to: { nodeId: grp.dataset.nodeId, portName: "in" }, control: true },
              { from: { nodeId: v.dataset.nodeId,    portName: "value" }, to: { nodeId: grp.dataset.nodeId, portName: "in" } },
              { from: { nodeId: grp.dataset.nodeId,  portName: "out"   }, to: { nodeId: out.dataset.nodeId, portName: "in" } },
            ]);
          },
        },
      };

      function clearCanvas() {
        canvas.setEdges([]);
        for (const n of [...canvas.querySelectorAll("sherpa-node")]) n.remove();
        nodeIdCounter = 1;
      }

      async function loadSample(key) {
        const def = SAMPLES[key];
        if (!def) return;
        // Loading a sample drops any drill-down state and forgets every
        // stored sub-graph (they belonged to the previous sample's nodes).
        drillStack.length = 0;
        SUBGRAPHS.clear();
        delete topbar.dataset.subgraph;
        delete canvasWrap.dataset.subgraph;
        viewHeader.removeAttribute("data-back-button");
        viewHeader.setAttribute("data-label", DEFAULT_HEADING);
        clearCanvas();
        await def.build();
        canvas.setViewport({ x: 0, y: 0, zoom: 1 });
        refreshJSON();
        logLine("evt", `· loaded sample "${def.label}"`);
      }

      samplePicker.addEventListener("change", (e) => {
        loadSample(samplePicker.value);
      });

      // ── Event listeners ───────────────────────────────────────────
      canvas.addEventListener("sherpa-edge-create", (e) => {
        canvas.addEdge(e.detail);
        logLine("evt", `+ edge ${e.detail.from.nodeId}.${e.detail.from.portName} → ${e.detail.to.nodeId}.${e.detail.to.portName}`);
      });
      canvas.addEventListener("sherpa-edge-update", (e) => {
        logLine("evt", `~ edge[${e.detail.edgeIdx}] → ${e.detail.edge.to.nodeId}.${e.detail.edge.to.portName}`);
      });
      canvas.addEventListener("sherpa-edge-delete", (e) => {
        logLine("del", `- edge[${e.detail.edgeIdx}]`);
      });
      canvas.addEventListener("sherpa-edge-select", (e) => {
        logLine("evt", `· select edge ${e.detail.edgeIdx ?? "(none)"}`);
      });
      canvas.addEventListener("sherpa-node-subtype-change", (e) => {
        logLine("evt", `· subtype ${e.detail.nodeId} → ${e.detail.subtype}`);
      });
      canvas.addEventListener("sherpa-node-select", (e) => {
        logLine("evt", `· select node ${e.detail.nodeId ?? "(none)"}`);
      });
      canvas.addEventListener("sherpa-node-delete", (e) => {
        logLine("del", `- node ${e.detail.nodeId}`);
        // If the deleted node had a stored sub-graph, drop it.
        SUBGRAPHS.delete(e.detail.nodeId);
      });
      canvas.addEventListener("sherpa-node-drilldown", (e) => {
        enterSubgraph(e.detail.nodeId);
      });

      // ── Keep the JSON panel in sync ───────────────────────────────
      // Edge / subtype / delete events bubble from the canvas; node
      // drag finishes mutate data-x/data-y attributes (no event), and
      // control inputs fire native input/change events. Cover all
      // three with a MutationObserver + bubbling input listener.
      const JSON_REFRESH_EVENTS = [
        "sherpa-edge-create", "sherpa-edge-update", "sherpa-edge-delete",
        "sherpa-node-subtype-change", "sherpa-node-delete",
      ];
      for (const evt of JSON_REFRESH_EVENTS) {
        canvas.addEventListener(evt, refreshJSON);
      }
      canvas.addEventListener("input", refreshJSON);
      canvas.addEventListener("change", refreshJSON);
      new MutationObserver(refreshJSON).observe(canvas, {
        subtree: true,
        attributes: true,
        attributeFilter: ["data-x", "data-y", "data-locked", "data-subtype", "value"],
        childList: true,
      });

      // ── Drill-down stack ─────────────────────────────────────────
      // Each frame:
      //   { parentId, parentLabel, state: { nodes, edges, viewport } }
      // Top of stack === currently visible sub-graph's parent.
      const drillStack = [];
      // Persistent storage of every sub-graph we've ever entered, keyed
      // by the parent group node's id. So edits made inside a group
      // survive when you back out and re-enter.
      const SUBGRAPHS = new Map();

      // ── Logic-only serialisation for the JSON panel ───────────────
      // Describes *what the graph does*, stripped of visual state
      // (positions, viewport, locked flags, lockable container shape).
      // Each node entry lists its type, resolved inputs, and any
      // control-flow target(s).
      function serialiseLogic() {
        const allEdges  = canvas.getEdges();
        const dataEdges = allEdges.filter(e => !e.control);
        const ctlEdges  = allEdges.filter(e =>  e.control);

        // Index data inputs: target nodeId -> portName -> [{ from, port }]
        const incoming = new Map();
        for (const e of dataEdges) {
          const tgt = e.to?.nodeId;
          if (!tgt) continue;
          let byPort = incoming.get(tgt);
          if (!byPort) { byPort = new Map(); incoming.set(tgt, byPort); }
          let arr = byPort.get(e.to.portName);
          if (!arr) { arr = []; byPort.set(e.to.portName, arr); }
          arr.push({ from: e.from.nodeId, port: e.from.portName });
        }
        // Index control flow: source nodeId -> [{ to, port }]
        const outgoingCtl = new Map();
        for (const e of ctlEdges) {
          if (!e.from?.nodeId || !e.to?.nodeId) continue;
          let arr = outgoingCtl.get(e.from.nodeId);
          if (!arr) { arr = []; outgoingCtl.set(e.from.nodeId, arr); }
          arr.push({ to: e.to.nodeId, port: e.to.portName });
        }

        // Coerce control values: numbers stay numbers, booleans → bool,
        // everything else stays a string.
        const coerce = (raw, ctrlEl) => {
          if (raw === "" || raw == null) return null;
          const tag = ctrlEl?.localName || "";
          if (tag === "sherpa-input-number") {
            const n = Number(raw);
            return Number.isFinite(n) ? n : raw;
          }
          if (tag === "sherpa-input-switch" || tag === "sherpa-switch") {
            return raw === "true" || raw === true;
          }
          return String(raw);
        };

        const nodes = {};
        const triggers = [];
        for (const n of canvas.querySelectorAll("sherpa-node")) {
          const id = n.dataset.nodeId;
          const kind = n.dataset.kind;
          const subtype = n.dataset.subtype;
          const type = subtype ? `${kind}.${subtype}` : kind;

          // Capture controls keyed by name, with their elements for coercion.
          // Controls live inside <sherpa-node-row>; use a descendant
          // query but skip any belonging to a nested <sherpa-node>.
          const controlEls = {};
          for (const c of n.querySelectorAll("[slot='control'][name]")) {
            if (c.closest("sherpa-node") !== n) continue;
            controlEls[c.getAttribute("name")] = c;
          }

          // Resolve inputs from sockets.
          const inputs = {};
          const byPort = incoming.get(id);
          // Sockets are slotted inside <sherpa-node-row> /
          // <sherpa-node-header> wrappers — descendant query, then
          // filter out sockets that belong to a nested node.
          const inSockets = [...n.querySelectorAll(
            'sherpa-node-socket[data-direction="in"][data-port-name]'
          )].filter(s => s.closest("sherpa-node") === n);
          const seenPorts = new Set();
          for (const sock of inSockets) {
            const port = sock.dataset.portName;
            seenPorts.add(port);
            const isMulti = sock.hasAttribute("data-multi");
            const providers = byPort?.get(port) || [];
            if (providers.length) {
              const refs = providers.map(p => ({ $from: `${p.from}.${p.port}` }));
              inputs[port] = isMulti ? refs : refs[0];
            } else if (port in controlEls) {
              inputs[port] = coerce(
                ("value" in controlEls[port]) ? controlEls[port].value : controlEls[port].getAttribute("value"),
                controlEls[port],
              );
            } else if (isMulti) {
              inputs[port] = [];
            } else {
              inputs[port] = null;
            }
          }
          // Standalone controls (no matching input socket) — e.g. the
          // Property node's category/field selectors. Surface them as
          // configuration so the logic still captures the intent.
          const config = {};
          for (const [name, el] of Object.entries(controlEls)) {
            if (seenPorts.has(name)) continue;
            config[name] = coerce(
              ("value" in el) ? el.value : el.getAttribute("value"),
              el,
            );
          }

          const entry = { type };
          if (Object.keys(inputs).length) entry.inputs = inputs;
          if (Object.keys(config).length) entry.config = config;
          const next = outgoingCtl.get(id);
          if (next?.length) {
            entry.next = next.length === 1
              ? next[0].to
              : next.map(x => x.to);
          }
          nodes[id] = entry;

          // Source/trigger nodes are the entry points of the program.
          if (kind === "source") triggers.push(id);
        }

        const out = { nodes };
        if (triggers.length) out.triggers = triggers.length === 1 ? triggers[0] : triggers;
        return out;
      }

      function serialiseCanvas() {
        const nodes = [...canvas.querySelectorAll("sherpa-node")].map(n => {
          // Raw control values keyed by name. Read the live `.value`
          // when available so freshly typed input is captured. Controls
          // sit inside <sherpa-node-row>, so use a descendant query
          // and skip any belonging to a nested <sherpa-node>.
          const controls = {};
          for (const c of n.querySelectorAll("[slot='control'][name]")) {
            if (c.closest("sherpa-node") !== n) continue;
            const v = ("value" in c) ? c.value : c.getAttribute("value");
            controls[c.getAttribute("name")] = v ?? "";
          }
          return {
            nodeId: n.dataset.nodeId,
            kind:   n.dataset.kind,
            subtype:n.dataset.subtype,
            x:      parseFloat(n.dataset.x) || 0,
            y:      parseFloat(n.dataset.y) || 0,
            locked: n.hasAttribute("data-locked"),
            controls,
          };
        });
        return {
          nodes,
          edges: canvas.getEdges(),
          viewport: canvas.getViewport(),
        };
      }

      async function restoreCanvas(state) {
        clearCanvas();
        if (!state) return;
        // Bump the id counter beyond anything we might re-instate so
        // future newly-created nodes don't collide.
        for (const n of state.nodes) {
          const m = /(\d+)$/.exec(n.nodeId);
          if (m) nodeIdCounter = Math.max(nodeIdCounter, parseInt(m[1], 10) + 1);
        }
        for (const n of state.nodes) {
          const node = document.createElement("sherpa-node");
          node.dataset.nodeId = n.nodeId;
          node.dataset.x = String(n.x);
          node.dataset.y = String(n.y);
          if (n.locked) node.setAttribute("data-locked", "");
          canvas.appendChild(node);
          await configureNode(node, n.kind, n.subtype);
          // Re-apply control values. Controls live inside
          // <sherpa-node-row>, so use a descendant query.
          for (const [name, value] of Object.entries(n.controls || {})) {
            const ctrl = node.querySelector(`[slot='control'][name="${CSS.escape(name)}"]`);
            if (ctrl) ctrl.setAttribute("value", value);
          }
        }
        await new Promise(r => requestAnimationFrame(r));
        canvas.setEdges(state.edges || []);
        if (state.viewport) canvas.setViewport(state.viewport);
      }

      function getNodeLabel(nodeId) {
        const n = canvas.querySelector(`sherpa-node[data-node-id="${CSS.escape(nodeId)}"]`);
        if (!n) return nodeId;
        // Try the rendered title; fall back to "Group".
        const titleSpan = n.querySelector('[slot="title"]');
        return titleSpan?.textContent?.trim() || (KIND_LABELS[n.dataset.kind] || nodeId);
      }

      function rootHeading() {
        return DEFAULT_HEADING;
      }

      function syncHeadingFromStack() {
        const parts = [rootHeading(), ...drillStack.map(f => f.parentLabel)];
        viewHeader.setAttribute("data-label", parts.join("  ›  "));
      }

      /** Build a starter sub-graph (Trigger → Add → Output) so a
       *  freshly-drilled-into Group already has something to play with.
       *  Returns the same shape that serialiseCanvas() does. */
      function makeStarterSubgraph(parentId) {
        const stamp = parentId.replace(/[^a-z0-9]/gi, "");
        const ids = {
          trig: `sub-${stamp}-trigger`,
          a:    `sub-${stamp}-a`,
          b:    `sub-${stamp}-b`,
          add:  `sub-${stamp}-add`,
          out:  `sub-${stamp}-output`,
        };
        return {
          nodes: [
            // Boundary nodes — locked: they represent the parent
            // Group's input / output sockets and cannot be deleted
            // or duplicated.
            { nodeId: ids.trig, kind: "source",   subtype: "trigger", x: 60,   y: 80,  locked: true, controls: {} },
            { nodeId: ids.a,    kind: "variable", subtype: "number",  x: 60,   y: 320, controls: { value: "3" } },
            { nodeId: ids.b,    kind: "variable", subtype: "number",  x: 60,   y: 560, controls: { value: "4" } },
            { nodeId: ids.add,  kind: "math",     subtype: "add",     x: 480,  y: 420, controls: {} },
            { nodeId: ids.out,  kind: "output",   subtype: "default", x: 940,  y: 420, locked: true, controls: {} },
          ],
          edges: [
            { from: { nodeId: ids.a,    portName: "value" }, to: { nodeId: ids.add, portName: "a"  } },
            { from: { nodeId: ids.b,    portName: "value" }, to: { nodeId: ids.add, portName: "b"  } },
            { from: { nodeId: ids.add,  portName: "out"   }, to: { nodeId: ids.out, portName: "in" } },
            { from: { nodeId: ids.trig, portName: "out"   }, to: { nodeId: ids.out, portName: "in" }, control: true },
          ],
          viewport: { x: 0, y: 0, zoom: 1 },
        };
      }

      async function enterSubgraph(parentId) {
        if (!parentId) return;
        const parentLabel = getNodeLabel(parentId);
        // Snapshot the current view before we unload it.
        const snapshot = serialiseCanvas();
        // The frame we're pushing represents *the parent we just left*.
        // Its state is the parent graph's snapshot we'll come back to.
        drillStack.push({ parentId, parentLabel, state: snapshot });
        // Load (or initialise) the sub-graph for this parent.
        const stored = SUBGRAPHS.get(parentId);
        await restoreCanvas(stored || makeStarterSubgraph(parentId));
        topbar.dataset.subgraph = "true";
        canvasWrap.dataset.subgraph = "true";
        viewHeader.setAttribute("data-back-button", "true");
        setBoundaryPaletteDisabled(true);
        syncHeadingFromStack();
        logLine("evt", `↳ drill into ${parentId}`);
      }

      async function exitSubgraph() {
        if (!drillStack.length) return;
        // Save the sub-graph we're leaving so re-entry restores edits.
        const leaving = drillStack[drillStack.length - 1];
        SUBGRAPHS.set(leaving.parentId, serialiseCanvas());
        const frame = drillStack.pop();
        await restoreCanvas(frame.state);
        if (!drillStack.length) {
          delete topbar.dataset.subgraph;
          delete canvasWrap.dataset.subgraph;
          viewHeader.removeAttribute("data-back-button");
          setBoundaryPaletteDisabled(false);
        }
        syncHeadingFromStack();
        logLine("evt", `↰ exit drill-down`);
      }

      viewHeader.addEventListener("viewheaderback", () => exitSubgraph());

      /** Boundary kinds (Trigger / Output) are fixed inside a sub-graph,
       *  so the palette items for those kinds are visually disabled
       *  while drilled in. */
      function setBoundaryPaletteDisabled(disabled) {
        const items = palette.querySelectorAll(
          '.item[data-kind="source"], .item[data-kind="output"]'
        );
        for (const it of items) {
          if (disabled) {
            it.setAttribute("data-disabled", "");
            it.setAttribute("draggable", "false");
          } else {
            it.removeAttribute("data-disabled");
            it.setAttribute("draggable", "true");
          }
        }
      }

      // ── Boot ──────────────────────────────────────────────────────
      (async () => {
        await buildPalette();
        samplePicker.setOptions(
          Object.entries(SAMPLES).map(([value, def]) => ({ value, label: def.label }))
        );
        samplePicker.setAttribute("value", "catalogue");
        await loadSample("catalogue");
      })();
    </script>
  </body>
</html>
