<!--
  sherpa-container-pdf.html — Templates for sherpa-container-pdf.

  Templates:
    • default  — PDF header + metrics + sections
    • (custom) — Consumers can add additional <template id="..."> blocks here
                  to define alternative PDF layouts. Use the component's
                  `get templateId()` override to select a template by id.

  Host attributes:
    data-theme    — Set to "light" for PDF export
    data-pdf-mode — PDF mode indicator (set on child components)

  Custom templates:
    To define a custom layout, add a new <template id="my-layout"> block
    below the existing templates. Override `get templateId()` in a subclass
    or set it dynamically to select the template at render time.
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     DEFAULT — PDF header + metrics + sections
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="default">
  <header class="pdf-header">
    <h2 class="pdf-title text-heading-lg"></h2>
    <p class="pdf-description text-body-sm"></p>
  </header>

  <div class="pdf-metrics"></div>

  <div class="pdf-sections"></div>

  <!-- Cloning prototype: PDF section with chart + table presentations -->
  <template class="section-tpl">
    <div class="pdf-section">
      <h3 class="pdf-section-title"></h3>
      <div class="pdf-presentation pdf-chart-wrapper"></div>
      <div class="pdf-presentation pdf-table-wrapper"></div>
    </div>
  </template>
</template>
