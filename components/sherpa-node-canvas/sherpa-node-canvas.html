<!--
  sherpa-node-canvas — Pan/zoom container for sherpa-nodes with edge layer.

  Visual layers (back to front):
    1. <canvas class="grid">     — Crosshair grid (CSS-controllable)
    2. <canvas class="edges">    — Bezier edges + drag-ghost
    3. <div    class="surface">  — Transformed div containing nodes (slot)

  The two canvases share the same DPR-scaled coordinate space and are
  redrawn whenever the viewport changes or a node moves.

  An embedded <sherpa-view-header part="header"> sits above the canvas
  and is auto-driven by the internal drill-down stack: the heading
  reflects the current frame, the back button appears whenever the
  stack is non-empty, and a breadcrumb trail of ancestor labels is
  slotted into the header on demand.

  Host attributes:
    data-grid          — "crosshair" (default) | "none"
    data-heading       — Title shown when at the root frame
    data-show-header  — "false" hides the embedded view-header

  Slots:
    (default)        — sherpa-node children placed inside the surface
    header-actions   — Forwarded to the embedded view-header
    side-panel-end   — Trailing side panel (typically a sherpa-content-section)
                       laid out alongside the canvas surface; its width
                       follows the slotted element, so a content-section
                       that minimises will reclaim space for the canvas.
-->
<div class="root">
  <sherpa-view-header class="canvas-header" part="header"
    exportparts="container: header-container">
    <slot name="header-actions" slot="view-selection"></slot>
  </sherpa-view-header>
  <div class="canvas-body">
    <div class="canvas-stack">
      <canvas class="layer grid"></canvas>
      <canvas class="layer edges"></canvas>
      <div class="surface">
        <slot></slot>
      </div>
    </div>
    <slot name="side-panel-end" class="side-panel-end"></slot>
  </div>
</div>
