<!-- sherpa-filter-chip-menu.html — Menu templates for filter chip dropdown.
     Light DOM content for the singleton sherpa-menu, following the sherpa-menu
     styled list pattern. JS (#populateMenu) injects column items into
     ul[data-group="columns"] and sets the heading text to match
     the chip's current label. -->

<template id="sort">
  <sherpa-menu-item data-type="heading"></sherpa-menu-item>
  <ul data-group="columns">
    <li><sherpa-menu-item data-selection="radio" checked data-role="none-option" value="">None</sherpa-menu-item></li>
  </ul>
</template>

<template id="filter">
  <sherpa-menu-item data-type="heading"></sherpa-menu-item>
  <ul data-group="actions">
    <li><sherpa-menu-item data-role="select-all" data-action="select-all" value="">Select all</sherpa-menu-item></li>
    <li><sherpa-menu-item data-role="clear-all" data-action="clear-all" value="">Clear all</sherpa-menu-item></li>
  </ul>
  <ul data-group="values">
    <!-- Populated by JS with checkbox menu items for each unique value -->
  </ul>
</template>

<template id="segment">
  <sherpa-menu-item data-type="heading"></sherpa-menu-item>
  <ul data-group="columns">
    <li><sherpa-menu-item data-selection="radio" checked data-role="none-option" value="">None</sherpa-menu-item></li>
  </ul>
</template>

<template id="timeframe">
  <sherpa-menu-item data-type="heading">Time range</sherpa-menu-item>
  <ul data-group="ranges">
    <li><sherpa-menu-item data-selection="radio" data-role="range-option" value="1d">Last 24 hours</sherpa-menu-item></li>
    <li><sherpa-menu-item data-selection="radio" data-role="range-option" value="1w">Last 7 days</sherpa-menu-item></li>
    <li><sherpa-menu-item data-selection="radio" data-role="range-option" value="1m">Last 30 days</sherpa-menu-item></li>
    <li><sherpa-menu-item data-selection="radio" data-role="range-option" value="1q">Last 90 days</sherpa-menu-item></li>
    <li><sherpa-menu-item data-selection="radio" data-role="range-option" value="1y">Last 365 days</sherpa-menu-item></li>
    <li><sherpa-menu-item data-selection="radio" data-role="range-option" value="" checked>All time</sherpa-menu-item></li>
  </ul>
</template>
