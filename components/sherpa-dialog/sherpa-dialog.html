<!--
  sherpa-dialog.html — Templates for sherpa-dialog.

  Templates:
    • default — Standard modal dialog with native header, content area, and sherpa-footer.
    • (custom) — Consumers can add additional <template id="..."> blocks here
                  to define alternative dialog layouts. Use the component's
                  `get templateId()` override to select a template by id.

  Host attributes:
    data-label       — Dialog title text
    data-subtitle    — Dialog subtitle text
    data-size        — "small" | "medium" | "large" | "full"
    data-open        — Dialog visibility ("true" to show)
    data-dismissible — Shows close button ("true"/"false", default: true)

  Custom templates:
    To define a custom layout, add a new <template id="my-layout"> block
    below the default. Override `get templateId()` in a subclass or set it
    dynamically to select the template at render time.
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     DEFAULT — Header / content / footer dialog
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="default">
  <dialog class="dialog" part="dialog">
    <header class="header-row" part="header">
      <dl class="header-labels">
        <dt class="header-title"></dt>
        <dd class="header-description"></dd>
      </dl>
      <slot name="heading"></slot>
      <sherpa-button
        class="close-button"
        data-variant="tertiary"
        data-size="small"
        data-icon-start="&#xf00d;"
        aria-label="Close"
      ></sherpa-button>
    </header>

    <div class="dialog-content text-body" part="content">
      <slot></slot>
    </div>

    <sherpa-footer data-type="slot" part="footer">
      <slot name="footer"></slot>
    </sherpa-footer>
  </dialog>
</template>

<!-- ═══════════════════════════════════════════════════════════════════════
     EXAMPLE CUSTOM TEMPLATE — Confirmation dialog (no footer)

     Consumers can add templates like this for alternative layouts.
     Each template must have a unique id. The component selects a template
     via `get templateId()`.
     ═══════════════════════════════════════════════════════════════════════ -->
<!-- ══════════════════════════════════════════════════════════════════════
     WIZARD — Multi-page modal with step indicator + back/next footer.
     Consumers project <section data-page="0|1|2">...</section> blocks. The
     component shows the section matching the host's data-page attribute.
     ══════════════════════════════════════════════════════════════════════ -->
<template id="wizard">
  <dialog class="dialog dialog-wizard" part="dialog">
    <header class="header-row" part="header">
      <dl class="header-labels">
        <dt class="header-title"></dt>
        <dd class="header-description"></dd>
      </dl>
      <span class="wizard-step-indicator" aria-live="polite"></span>
      <sherpa-button
        class="close-button"
        data-variant="tertiary"
        data-size="small"
        data-icon-start="&#xf00d;"
        aria-label="Close"
      ></sherpa-button>
    </header>

    <div class="dialog-content text-body" part="content">
      <slot></slot>
    </div>

    <sherpa-footer data-type="slot" part="footer">
      <sherpa-button class="wizard-back" data-variant="secondary" data-label="Back"></sherpa-button>
      <sherpa-button class="wizard-next" data-variant="primary" data-label="Next"></sherpa-button>
      <slot name="footer"></slot>
    </sherpa-footer>
  </dialog>
</template>
