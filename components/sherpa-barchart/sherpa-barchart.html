<!--
  sherpa-barchart.html — Templates for sherpa-barchart.

  Templates:
    • default  — Header with menu button + SVG chart area
    • (custom) — Consumers can add additional <template id="..."> blocks here
                  to define alternative chart layouts. Use the component's
                  `get templateId()` override to select a template by id.

  Host attributes:
    data-loading        — Loading state indicator
    data-stacked        — Stacked bar mode
    data-title          — Chart heading text
    data-orientation    — "horizontal" | "vertical"
    data-segment-field  — Field name for segment grouping
    data-segment-mode   — Segment mode: "on" | "off"
    data-sort-field     — Field name for sorting
    data-sort-direction — "asc" | "desc"
    data-show-header    — "true" | "false" — Show/hide the header row
    data-menu-button    — "true" — Show menu button

  Inherited from ContentAttributesMixin:
    data-query-src, data-query-key, data-label, data-dataset,
    data-category, data-series, data-value-field, data-agg,
    data-measures, data-filters, data-order-by, data-limit,
    data-timerange, data-visible, data-show-status, data-unit,
    data-show-header, data-show-header-controls, data-show-view-menu

  Custom templates:
    To define a custom layout, add a new <template id="my-layout"> block
    below the existing templates. Override `get templateId()` in a subclass
    or set it dynamically to select the template at render time.
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     DEFAULT — Header with menu button + SVG chart area
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="default">
  <header class="header-row">
    <dl class="header-labels">
      <dt class="header-title"></dt>
      <dd class="header-description"></dd>
    </dl>
    <sherpa-button
      class="menu-button"
      data-type="icon-menu"
      data-variant="tertiary"
      data-size="small"
      data-icon-start="&#xf142;"
      aria-label="Menu"
      data-tooltip="Menu"
      data-menu-position="bottom-end"
      data-menu-scope="shadow"
      data-keep-compact
    ></sherpa-button>
  </header>

  <sherpa-filter-bar data-embedded data-type="local">
    <sherpa-button slot="group" data-type="button-menu" data-split data-behavior="segment" data-label="Group" data-icon-start="&#xf5fd;" data-menu-scope="none"
      ></sherpa-button
    >
    <sherpa-button slot="sort" data-type="button-menu" data-split data-behavior="sort" data-sort-type="value" data-label="Sort" data-icon-start="&#xf0dc;" data-no-dropdown data-menu-scope="none"
      ></sherpa-button
    >
    <sherpa-button
      slot="actions"
      data-variant="tertiary"
      data-size="small"
      data-action="clear"
      >Clear filter</sherpa-button
    >
  </sherpa-filter-bar>

  <div class="chart-area">
    <div class="chart-rows"></div>
    <div class="chart-empty">No data</div>
    <div class="chart-axis">
      <span class="chart-axis-pad"></span>
      <div class="chart-axis-values"></div>
    </div>
    <div class="chart-legend"></div>
  </div>
  <sherpa-tooltip></sherpa-tooltip>

  <!-- Filter-menu — cloned into a light-DOM <template data-menu> on connect -->
  <template id="filter-menu">
    <sherpa-menu-item
      data-selection="checkbox"
      data-event="toggle-filters"
    >Show / hide filters</sherpa-menu-item>
    <sherpa-menu-item
      data-selection="checkbox"
      data-event="toggle-legend"
      checked
    >Show / hide legend</sherpa-menu-item>
  </template>
</template>
