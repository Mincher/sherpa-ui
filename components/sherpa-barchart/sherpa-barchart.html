<!--
  sherpa-barchart.html — Templates for sherpa-barchart.

  Templates:
    • default  — Header with filter chips + SVG chart area
    • (custom) — Consumers can add additional <template id="..."> blocks here
                  to define alternative chart layouts. Use the component's
                  `get templateId()` override to select a template by id.

  Host attributes:
    data-loading        — Loading state indicator
    data-stacked        — Stacked bar mode
    data-title          — Chart heading text
    data-orientation    — "horizontal" | "vertical"
    data-segment-field  — Field name for segment grouping
    data-segment-mode   — Segment mode: "on" | "off"
    data-sort-field     — Field name for sorting
    data-sort-direction — "asc" | "desc"

  Inherited from ContentAttributesMixin:
    data-query-src, data-query-key, data-label, data-dataset,
    data-category, data-series, data-value-field, data-agg,
    data-measures, data-filters, data-order-by, data-limit,
    data-timerange, data-visible, data-show-status, data-unit,
    data-show-header, data-show-header-controls, data-show-view-menu

  Custom templates:
    To define a custom layout, add a new <template id="my-layout"> block
    below the existing templates. Override `get templateId()` in a subclass
    or set it dynamically to select the template at render time.
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     DEFAULT — Header with filter chips + SVG chart area
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="default">
  <sherpa-header
    data-type="data-viz"
    data-show-header="true"
    data-show-header-controls="true"
    data-show-view-menu="true"
  >
  </sherpa-header>
  <div class="chart-area">
    <div class="chart-rows"></div>
    <div class="chart-empty">No data</div>
    <div class="chart-axis">
      <span class="chart-axis-pad"></span>
      <div class="chart-axis-values"></div>
    </div>
    <div class="chart-legend"></div>
  </div>
  <sherpa-tooltip></sherpa-tooltip>
</template>
