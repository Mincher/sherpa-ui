<!--
  sherpa-donut-chart.html — Templates for sherpa-donut-chart.

  Templates:
    • default  — Circular div with conic-gradient slices + centre label
    • (custom) — Consumers can add additional <template id="..."> blocks here
                  to define alternative chart layouts. Use the component's
                  `get templateId()` override to select a template by id.

  Host attributes:
    data-title          — Chart title
    data-inner-label    — Centre big text (e.g. "100")
    data-inner-sublabel — Centre small text (e.g. "TOTAL")
    data-loading        — Boolean, dims chart
    data-variant        — donut (default) | pie

  Methods:
    setData([{ label, value, color? }])

  Custom templates:
    To define a custom layout, add a new <template id="my-layout"> block
    below the existing templates. Override `get templateId()` in a subclass
    or set it dynamically to select the template at render time.
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     DEFAULT — Circular div with conic-gradient slices + centre label
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="default">
  <div class="chart-header">
    <span class="chart-title"></span>
  </div>
  <div class="chart-area">
    <div class="donut-ring" aria-hidden="true"></div>
    <div class="donut-hole"></div>
    <div class="centre-label">
      <span class="centre-value"></span>
      <span class="centre-sublabel"></span>
    </div>
  </div>
  <div class="chart-legend"></div>
  <sherpa-tooltip></sherpa-tooltip>
</template>
