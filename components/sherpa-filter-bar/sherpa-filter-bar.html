<!--
  sherpa-filter-bar.html — Templates for sherpa-filter-bar.

  Templates:
    • default — Full filter bar with zoned slot layout (for global use)
    • local   — Minimal filter bar with only group + sort (for containers)

  Slot order (default template, left → right):
    toggle    — Filter on/off toggle (slot="toggle")
    group     — Group/segment chip (slot="group")
    sort      — Sort chip (slot="sort")
    presets   — Preset filter chips (slot="presets")
    filters   — User-added dynamic filter chips (default slot) + Add button
    actions   — Clear / Apply / Save actions (slot="actions")

  Slot order (local template, left → right):
    group     — Group/segment chip (slot="group")
    sort      — Sort chip (slot="sort")
    actions   — Clear action (slot="actions")

  Host attributes:
    data-density  — "compact" | "comfortable"
    data-active   — Present when any filter is active
    data-embedded — No top border (for embedding inside other components)
    data-type     — "local" selects the local template (default: full layout)

  Custom templates:
    To define a custom layout, add a new <template id="my-layout"> block
    below. Override `get templateId()` in a subclass or set it
    dynamically to select the template at render time.
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     DEFAULT — Full filter bar with zoned slot layout (global)
     Has toggle, all filter zones, add button, and actions.
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="default">
  <div class="filter-surface">
    <slot name="toggle"></slot>
    <slot name="group"></slot>
    <slot name="sort"></slot>
    <slot name="presets"></slot>
    <slot></slot>
    <sherpa-button
      class="add-filter-button"
      data-type="icon-select"
      data-variant="secondary"
      data-icon-start="&#xf067;"
      data-size="small"
      hidden
    ></sherpa-button>
    <slot name="actions"></slot>
  </div>
</template>

<!-- ═══════════════════════════════════════════════════════════════════════
     LOCAL — Minimal filter bar for containers (group + sort only)
     No toggle, no presets, no add-filter button.
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="local">
  <div class="filter-surface">
    <slot name="group"></slot>
    <slot name="sort"></slot>
    <slot name="actions"></slot>
  </div>
</template>
