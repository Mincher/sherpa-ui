<template id="default">
  <!-- Collapsed trigger (inline only) -->
  <button class="collapse-trigger" aria-label="Expand panel" type="button">
    <i class="fa-solid fa-plus" aria-hidden="true"></i>
  </button>

  <!-- Panel body -->
  <div class="panel-body">
    <!-- Header -->
    <header class="panel-header">
      <div class="header-row">
        <span class="heading"></span>
        <div class="controls">
          <slot name="controls"></slot>
          <button class="close-btn" type="button" aria-label="Close panel">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          </button>
        </div>
      </div>
      <div class="metadata">
        <slot name="metadata"></slot>
      </div>
    </header>

    <!-- Action bar -->
    <div class="action-bar">
      <slot name="actions"></slot>
    </div>

    <!-- Content area -->
    <div class="content">
      <slot></slot>
    </div>
  </div>
</template>
