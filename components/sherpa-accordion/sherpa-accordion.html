<!--
  sherpa-accordion.html — Shadow DOM template for sherpa-accordion.

  Uses native <details>/<summary> for expand/collapse behavior.
  No JS toggling needed — the browser handles open/close natively.

  Host attributes:
    data-label     — Heading text displayed in the summary row
    data-icon      — Optional leading icon (FontAwesome unicode)
    open           — Boolean, mirrors native details[open]
    disabled       — Prevents interaction

  Slots:
    (default) — Panel content revealed when expanded
    actions   — Optional trailing action buttons in the summary row
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     DEFAULT — Native details/summary accordion
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="default">
<details part="details">
  <summary class="trigger" part="trigger">
    <div class="trigger-left">
      <i class="trigger-icon" aria-hidden="true"></i>
      <span class="trigger-label text-body-emphasised-base"></span>
    </div>
    <div class="trigger-right">
      <slot name="actions"></slot>
      <i class="chevron fa-solid fa-chevron-down" aria-hidden="true"></i>
    </div>
  </summary>
  <div class="panel" part="panel">
    <slot></slot>
  </div>
</details>
</template>
