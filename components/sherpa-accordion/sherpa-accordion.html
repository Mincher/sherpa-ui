<!--
  sherpa-accordion.html — Templates for sherpa-accordion.

  Templates:
    • default  — Header trigger with label + icon, collapsible content slot
    • (custom) — Consumers can add additional <template id="..."> blocks here
                  to define alternative accordion layouts. Use the component's
                  `get templateId()` override to select a template by id.

  Host attributes:
    data-label     — Heading text displayed in the trigger row
    data-expanded  — Boolean, controls open/closed state
    data-icon      — Optional leading icon class (FontAwesome)
    disabled       — Prevents interaction

  Slots:
    (default) — Panel content revealed when expanded
    actions   — Optional trailing action buttons in the header row

  Custom templates:
    To define a custom layout, add a new <template id="my-layout"> block
    below the existing templates. Override `get templateId()` in a subclass
    or set it dynamically to select the template at render time.
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     DEFAULT — Header trigger with label + icon, collapsible content slot
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="default">
<div class="accordion-trigger" part="trigger" role="button" tabindex="0" aria-expanded="false">
  <div class="trigger-left">
    <i class="trigger-icon" aria-hidden="true"></i>
    <span class="trigger-label text-body-emphasised-base"></span>
    <slot name="heading"></slot>
  </div>
  <div class="trigger-right">
    <slot name="actions"></slot>
    <i class="chevron fa-solid fa-chevron-down" aria-hidden="true"></i>
  </div>
</div>
<div class="accordion-panel" part="panel" role="region">
  <div class="panel-content">
    <slot></slot>
  </div>
</div>
</template>
