<!--
  sherpa-input-select.html — Native select dropdown.

  Templates:
    • default — Native select element + chevron icon
    • tree    — Hierarchical picker (tree of values with collapsible branches)

  Tree template uses an internal hidden input as the form value carrier so
  that SherpaInputBase value handling continues to work transparently.

  Inherited from SherpaInputBase:
    data-label, data-description, data-helper, data-layout,
    disabled, readonly, required, name, value, placeholder,
    pattern, minlength, maxlength, novalidate

  Tree-only attributes (host):
    data-tree     — JSON [{value,label,children?,disabled?}] node forest
    data-expanded — (boolean) panel visibility (managed by JS)
-->
<template id="default">
<div class="select-wrapper">
  <select class="input-field"></select>
  <i class="select-chevron fa-solid fa-chevron-down" aria-hidden="true"></i>
</div>
</template>

<template id="tree">
<div class="tree-wrapper">
  <input type="hidden" class="input-field tree-value" />
  <button type="button" class="tree-button" aria-haspopup="tree" aria-expanded="false">
    <span class="tree-display"></span>
    <i class="select-chevron fa-solid fa-chevron-down" aria-hidden="true"></i>
  </button>
  <div class="tree-panel" role="tree"></div>
</div>
</template>
