<!--
  sherpa-metric.html — Templates for sherpa-metric.

  Templates:
    • default — Header + metric card with value, delta, and sparkline
    • (custom) — Consumers can add additional <template id="..."> blocks here
                  to define alternative metric layouts. Use the component's
                  `get templateId()` override to select a template by id.

  Host attributes:
    data-metric-id  — Unique identifier
    data-status     — "success" | "warning" | "critical" | "info" | "urgent"
    data-trend      — "up" | "down" | "flat" (controls icon + delta color)
    data-label      — Metric heading/label
    value           — Formatted metric value
    data-delta      — Change amount or unit type
    data-visible    — Metric visibility ("true"/"false")

  Inherited from ContentAttributesMixin:
    data-query-src, data-query-key, data-dataset, data-category,
    data-series, data-value-field, data-agg, data-measures,
    data-filters, data-order-by, data-limit, data-timerange,
    data-show-status, data-unit, data-show-header,
    data-show-header-controls, data-show-view-menu

  Custom templates:
    To define a custom layout, add a new <template id="my-layout"> block
    below the default. Override `get templateId()` in a subclass or set it
    dynamically to select the template at render time.
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     DEFAULT — Header + metric card with value, delta, sparkline
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="default">
<header class="header-row">
  <dl class="header-labels">
    <dt class="header-title"></dt>
    <dd class="header-description"></dd>
  </dl>
  <sherpa-button
    class="menu-button"
    data-type="icon-menu"
    data-variant="tertiary"
    data-size="small"
    data-icon-start="&#xf142;"
    aria-label="Menu"
    data-tooltip="Menu"
    data-menu-position="bottom-end"
    data-keep-compact
  ></sherpa-button>
</header>

<div class="metric-card">
  <div class="metric-labels">
    <p class="metric-value"></p>
    <div class="metric-trend">
      <i class="sherpa-icon metric-trend-icon metric-trend-up fa-solid fa-arrow-trend-up" data-size="xs"></i>
      <i
        class="sherpa-icon metric-trend-icon metric-trend-down fa-solid fa-arrow-trend-down"
        data-size="xs"
      ></i>
      <span class="metric-trend-text text-label">
        <span class="metric-delta text-metric-delta"></span>
      </span>
    </div>
  </div>

  <div class="metric-sparkline">
    <sherpa-sparkline></sherpa-sparkline>
  </div>
</div>
</template>
