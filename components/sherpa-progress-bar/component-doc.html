<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sherpa-progress-bar — Component Doc</title>
    <link rel="stylesheet" href="../../css/styles/sherpa-core.css" />
    <link rel="stylesheet" href="../../css/styles/themes/apex-2-core.css" />
    <link rel="stylesheet" href="../index.css" />
    <script type="module" src="../index.js"></script>
    <style>
      .demo-group {
        display: flex;
        flex-direction: column;
        gap: 24px;
        max-width: 600px;
        margin-block-end: 32px;
      }
      h2 {
        margin-block: 24px 12px;
      }
    </style>
  </head>
  <body>
    <h1>sherpa-progress-bar</h1>

    <h2>Determinate</h2>
    <div class="demo-group">
      <sherpa-progress-bar
        data-label="Uploading files"
        data-value="50"
      ></sherpa-progress-bar>

      <sherpa-progress-bar
        data-label="Almost done"
        data-value="90"
      ></sherpa-progress-bar>

      <sherpa-progress-bar data-value="25"></sherpa-progress-bar>
    </div>

    <h2>Indeterminate</h2>
    <div class="demo-group">
      <sherpa-progress-bar
        data-label="Processing…"
        data-variant="indeterminate"
      ></sherpa-progress-bar>
    </div>

    <h2>Custom status text</h2>
    <div class="demo-group">
      <sherpa-progress-bar
        data-label="Downloading"
        data-value="72"
        data-status-text="72 of 100 items"
      ></sherpa-progress-bar>
    </div>

    <h2>Interactive demo</h2>
    <div class="demo-group">
      <sherpa-progress-bar
        id="live-bar"
        data-label="Live progress"
        data-value="0"
      ></sherpa-progress-bar>
      <button onclick="
        let v = 0;
        const bar = document.getElementById('live-bar');
        const id = setInterval(() => {
          v += 5;
          bar.dataset.value = v;
          if (v >= 100) clearInterval(id);
        }, 200);
      ">Start</button>
    </div>
  </body>
</html>
