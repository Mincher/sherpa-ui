<!--
  sherpa-section-nav.html — Secondary navigation panel.

  Single template; the list of groups and items is supplied via the
  setSections(...) method (see sherpa-section-nav.js) or, alternatively,
  by setting the `data-sections` attribute to a JSON string.
-->
<template id="default">
  <header class="header" part="header">
    <button
      class="back"
      type="button"
      part="back"
      aria-label="Back"
      hidden
    >
      <i class="back-icon fa-regular fa-arrow-left" aria-hidden="true"></i>
    </button>
    <h2 class="heading text-heading-lg" part="heading"></h2>
    <span class="header-end" part="header-end">
      <slot name="header-end"></slot>
    </span>
  </header>

  <nav class="sections" part="sections" aria-label="Section navigation"></nav>

  <slot></slot>

  <!-- Cloning prototypes used by #renderSections() -->
  <template class="group-tpl">
    <section class="group">
      <h3 class="group-label text-label-group" hidden></h3>
      <ul class="group-list"></ul>
    </section>
  </template>

  <template class="header-item-tpl">
    <li class="header-item">
      <span class="header-item-name text-body"></span>
      <span class="header-item-description text-body-sm" hidden></span>
    </li>
  </template>

  <template class="item-tpl">
    <li>
      <button type="button" class="item text-body">
        <span class="item-label"></span>
        <i class="item-icon" aria-hidden="true" hidden></i>
      </button>
    </li>
  </template>
</template>
