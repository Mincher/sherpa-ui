<!--
  sherpa-tooltip.html — Simple tooltip component.

  Templates:
    • default — Tooltip surface with text content

  Host attributes:
    data-visible  — "true" | "false" — tooltip visibility
    data-position — "top" | "bottom" — tooltip placement
-->
<template id="default">
<div class="tooltip-surface">
	<span class="tooltip-content text-body-sm"></span>
</div>
</template>
