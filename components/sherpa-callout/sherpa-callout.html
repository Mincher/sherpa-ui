<!--
  sherpa-callout.html — Templates for sherpa-callout.

  Templates:
    • default  — Toggle button + status icon + heading + body content + optional action
    • (custom) — Consumers can add additional <template id="..."> blocks here
                  to define alternative callout layouts. Use the component's
                  `get templateId()` override to select a template by id.

  Host attributes:
    data-status     — info | warning | critical | success | neutral | tip
    data-heading    — Heading text
    data-expanded   — Expanded state (boolean)
    data-dismissible — Show dismiss / collapse toggle button
    data-icon       — Override status icon (Font Awesome codepoint)

  Slots:
    heading — Override heading text
    default — Body content
    action  — Optional action link/button

  Events:
    callout-toggle  — { expanded }
    callout-dismiss — {}

  Custom templates:
    To define a custom layout, add a new <template id="my-layout"> block
    below the existing templates. Override `get templateId()` in a subclass
    or set it dynamically to select the template at render time.
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     DEFAULT — Toggle button + status icon + heading + body + action
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="default">
  <div class="header">
    <button class="toggle-btn" type="button" aria-label="Toggle callout">
      <i class="toggle-icon" aria-hidden="true">&#xf078;</i>
    </button>
    <i class="status-icon" aria-hidden="true"></i>
    <div class="heading-area">
      <slot name="heading">
        <span class="heading-text"></span>
      </slot>
    </div>
  </div>
  <div class="body">
    <div class="body-content">
      <slot></slot>
    </div>
    <div class="action-area">
      <slot name="action"></slot>
    </div>
  </div>
</template>
