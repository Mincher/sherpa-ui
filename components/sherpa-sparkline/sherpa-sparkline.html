<!--
  sherpa-sparkline.html — Inline sparkline chart component.
  12 shape divs with point spans for area/bar visualization.

  Templates:
    • default — 12 shape segments with start/end points + tooltip

  Host attributes:
    data-values  — Comma-separated or JSON array of numeric values
    data-variant — "bar" for bar mode
    data-unit    — Unit label for tooltip display
-->
<template id="default">
<div class="shape" data-index="0">
  <span class="point" data-role="start" data-index="0"></span>
  <span class="point" data-role="end" data-index="1"></span>
</div>
<div class="shape" data-index="1">
  <span class="point" data-role="start" data-index="1"></span>
  <span class="point" data-role="end" data-index="2"></span>
</div>
