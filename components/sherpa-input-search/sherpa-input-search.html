<!--
  sherpa-input-search.html — Search input with clear button.

  Templates:
    • default — Search icon + input + clear button

  Inherited from SherpaInputBase:
    data-label, data-description, data-helper, data-layout,
    disabled, readonly, required, name, value, placeholder,
    pattern, minlength, maxlength, novalidate
-->
<template id="default">
<div class="search-wrapper">
  <span class="search-icon-wrapper">
    <i class="search-icon fa-solid fa-magnifying-glass" aria-hidden="true"></i>
    <input type="search" class="input-field" />
  </span>
  <sherpa-button class="search-clear input-action"
              data-variant="tertiary"
              data-icon-start="&#xf00d;"
              aria-label="Clear search"
              hidden></sherpa-button>
</div>
</template>
