<!--
  sherpa-button.html — Multi-template button component.

  Four templates selected via data-type attribute:

    default       — Standard button: icon(s) + label + badge
    icon          — Icon-only button (square aspect-ratio)
    button-select — Button + native <select> side by side (control group)
    icon-select   — Icon-only <select> (action picker, menu trigger)

  Template selection:
    get templateId() returns dataset.type || "default"
    Each template contains only the elements it needs.

  Host attributes (shared):
    data-type         — "icon" | "button-select" | "icon-select" (default omitted)
    data-label        — Button label text
    data-icon-start   — FontAwesome unicode for leading icon
    data-icon-end     — FontAwesome unicode for trailing icon
    data-icon-weight  — Icon weight: "regular" | "light" | "thin" (default: solid)
    data-variant      — "primary" | "secondary" | "tertiary"
    data-size         — "2x-small" | "x-small" | "small" | medium (default) | "large"
    data-active       — Active/pressed state (boolean attr)
    data-status       — "success" | "critical" | "warning" | "info" | "urgent"
    data-count        — Badge count (shown when > 0)
    data-closeable    — Shows close button (button-select only)
    disabled          — Disabled state (boolean attr)

  Events dispatched:
    buttonclick  — Trigger button clicked (detail: { })
    selectchange — Select value changed (detail: { value, selectedOptions })
    chipremove   — Close button clicked (detail: { })
    change       — Re-dispatched native change (bubbles, does not compose)
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     DEFAULT — Standard button: icon(s) + label + badge
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="default">
  <button class="trigger" type="button">
    <i class="icon-start" aria-hidden="true"></i>
    <span class="label"></span>
    <span class="badge" aria-hidden="true"></span>
    <i class="icon-end" aria-hidden="true"></i>
  </button>
</template>

<!-- ═══════════════════════════════════════════════════════════════════════
     ICON — Icon-only button (square, no label)
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="icon">
  <button class="trigger" type="button">
    <i class="icon-start" aria-hidden="true"></i>
  </button>
</template>

<!-- ═══════════════════════════════════════════════════════════════════════
     BUTTON-SELECT — Button + native select side by side (control group)
     Used for behavior chips: sort, filter, segment, timeframe
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="button-select">
  <button class="trigger" type="button">
    <i class="icon-start" aria-hidden="true"></i>
    <span class="label"></span>
    <span class="badge" aria-hidden="true"></span>
  </button>
  <select class="select"></select>
  <button class="close" type="button" aria-label="Close">
    <i class="fa-solid fa-xmark" aria-hidden="true"></i>
  </button>
</template>

<!-- ═══════════════════════════════════════════════════════════════════════
     ICON-SELECT — Icon-only select (action picker, menu trigger)
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="icon-select">
  <select class="select"></select>
</template>
