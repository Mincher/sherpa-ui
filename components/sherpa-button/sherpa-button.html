<!--
  sherpa-button.html — Templates for sherpa-button.

  Templates:
    • default — Icon-start + label + icon-end
    • (custom) — Consumers can add additional <template id="..."> blocks here
                  to define alternative button layouts. Use the component's
                  `get templateId()` override to select a template by id.

  Host attributes:
    data-label        — Button label text
    data-icon-start   — FontAwesome unicode for leading icon
    data-icon-end     — FontAwesome unicode for trailing icon
    data-icon-weight  — Icon weight class: "fa-solid" | "fa-regular" | "fa-light"
    data-variant      — "primary" | "secondary" | "tertiary"
    data-size         — "small" | "medium" | "large"
    data-active       — Active/pressed state
    data-status       — "success" | "critical" | "warning" | "info" | "urgent"
    data-menu         — "true" enables attached menu
    data-menu-position — Menu placement: "bottom-start" | "bottom-end" | etc.
    disabled          — Boolean, disabled state

  Custom templates:
    To define a custom layout, add a new <template id="my-layout"> block
    below the default. Override `get templateId()` in a subclass or set it
    dynamically to select the template at render time.
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     DEFAULT — Icon-start + label + icon-end
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="default">
<i class="icon-start" aria-hidden="true"></i>
<span class="label"></span>
<i class="icon-end" aria-hidden="true"></i>
</template>

<!-- ═══════════════════════════════════════════════════════════════════════
     EXAMPLE CUSTOM TEMPLATE — Icon-only (no label)

     Consumers can add templates like this for alternative layouts.
     Each template must have a unique id. The component selects a template
     via `get templateId()`.
     ═══════════════════════════════════════════════════════════════════════ -->
<!--
<template id="icon-only">
<i class="icon-start" aria-hidden="true"></i>
</template>
-->
