<!--
  sherpa-button.html — Unified button / behavior-chip template.

  Single template containing all elements. CSS controls visibility
  based on host attributes (data-behavior, data-closeable, etc.).

  Layout modes:
    Plain button:     [ trigger ]
    Behavior chip:    [ trigger | select ▼ ]
    Select only:      [ select (icon) ]
    With close:       [ ... | close × ]

  Label text comes from data-label attribute or light-DOM textContent,
  read programmatically by JS — no <slot> projection needed.

  Host attributes:
    data-label        — Button label text
    data-icon-start   — FontAwesome unicode for leading icon
    data-icon-end     — FontAwesome unicode for trailing icon (plain buttons)
    data-icon-weight  — Icon weight: "regular" | "light" | "thin" (default: solid)
    data-variant      — "primary" | "secondary" | "tertiary"
    data-size         — "2x-small" | "x-small" | "small" | medium (default) | "large"
    data-active       — Active/pressed state (boolean)
    data-status       — "success" | "critical" | "warning" | "info" | "urgent"
    data-behavior     — "sort" | "filter" | "segment" | "timeframe"
    data-mode         — Sort: "asc" | "desc" | "off"; Others: "on" | "off"
    data-field        — Selected field name (behavior buttons)
    data-closeable    — Shows close button (boolean)
    data-count        — Badge count (shown when > 0)
    data-boolean      — Boolean field — hides select (boolean)
    data-select-only  — Icon-only select mode (boolean)
    disabled          — Disabled state (boolean)
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     DEFAULT — Trigger + select + close
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="default">
  <button class="trigger" type="button">
    <i class="icon-start" aria-hidden="true"></i>
    <span class="label"></span>
    <span class="badge" aria-hidden="true"></span>
    <i class="icon-end" aria-hidden="true"></i>
  </button>
  <select class="select">
    <button type="button">
      <i class="select-icon" aria-hidden="true"></i>
      <i class="select-chevron" aria-hidden="true">&#xf078;</i>
    </button>
  </select>
  <button class="close" type="button" aria-label="Close">
    <i class="fa-solid fa-xmark" aria-hidden="true"></i>
  </button>
</template>
