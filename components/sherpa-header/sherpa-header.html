<!--
  sherpa-header.html — Templates for sherpa-header.

  Three built-in variants sharing the same flex-row base:
  labels (left) → actions (right).

  Templates:
    • default  — containers, dialogs, sections
    • menu     — popover / dropdown menu header
    • data-viz — chart / table header (filters below title)
    • (custom) — Consumers can add additional <template id="..."> blocks here
                  to define alternative header layouts. Use the component's
                  `get templateId()` override to select a template by id.

  Host attributes:
    data-type              — "container" | "dialog" | "section" | "card" | "menu" | "data-viz"
    data-label             — Title/heading text
    data-description       — Subtitle/description text
    data-heading-level     — "primary" | "secondary" | "tertiary"
    data-divider           — "true" | "false" — show bottom divider
    data-drag-handle       — "true" | "false" — show drag handle
    data-close-button      — "true" | "false" — show close button
    data-close-label       — Accessible label for close button
    data-search            — "true" | "false" — show search field (menu template)
    data-search-placeholder — Search field placeholder text
    data-density           — "compact" | "comfortable"
    data-dismissible       — "true" | "false" — close button visible (dialog type)
    data-open-external     — "true" | "false" — show open-external button
    data-menu-button       — "true" | "false" — show menu button

  Custom templates:
    To define a custom layout, add a new <template id="my-layout"> block
    below the existing templates. Override `get templateId()` in a subclass
    or set it dynamically to select the template at render time.
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     DEFAULT — containers, dialogs, sections
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="default">
  <header class="header-row" part="header">
    <div class="drag-handle" part="drag-handle" aria-label="Drag to reposition">
      <i
        class="fa-solid fa-grip-vertical sherpa-icon"
        data-size="xs"
        aria-hidden="true"
      ></i>
    </div>
    <div class="header-labels">
      <div class="heading-row">
        <slot name="heading"><span class="header-title"></span></slot>
        <span class="badge-slot" part="badge"><slot name="badge"></slot></span>
      </div>
      <slot name="description"
        ><p class="header-description text-body-sm"></p
      ></slot>
    </div>
    <div class="header-actions" part="actions">
      <slot name="actions"></slot>
    </div>
    <sherpa-button
      class="open-external-button"
      data-variant="tertiary"
      data-size="small"
      data-icon-start="&#xf08e;"
      aria-label="Open in view"
      data-tooltip="Open in view"
    ></sherpa-button>
    <span class="action-divider"></span>
    <sherpa-button
      class="menu-button"
      data-variant="tertiary"
      data-size="small"
      data-icon-start="&#xf142;"
      aria-label="Menu"
      data-tooltip="Menu"
      data-menu="true"
      data-menu-position="bottom-end"
      data-keep-compact
    ></sherpa-button>
    <sherpa-button
      class="close-button"
      data-variant="tertiary"
      data-size="small"
      data-icon-start="&#xf00d;"
      aria-label="Close"
    ></sherpa-button>
  </header>
  <hr class="header-divider" part="divider" />
</template>

<!-- ═══════════════════════════════════════════════════════════════════════
     MENU — popover / dropdown menu header
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="menu">
  <header class="header-row menu-header" part="header">
    <div class="header-labels">
      <p class="header-title"></p>
      <p class="header-description text-body-sm"></p>
    </div>
    <sherpa-button
      class="close-button"
      data-variant="tertiary"
      data-size="small"
      data-icon-start="&#xf00d;"
      aria-label="Close"
    ></sherpa-button>
  </header>
  <div class="search-row">
    <slot name="search">
      <sherpa-input-search
        class="search-field"
        placeholder="Search"
        aria-label="Search"
      ></sherpa-input-search>
    </slot>
  </div>
  <slot name="extra"></slot>
</template>

<!-- ═══════════════════════════════════════════════════════════════════════
     DATA-VIZ — chart / table header
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="data-viz">
  <header class="header-row data-viz-header" part="header">
    <div class="header-labels">
      <p class="header-title"></p>
      <p class="header-description text-body-sm"></p>
    </div>
    <div class="header-actions" part="actions">
      <slot name="actions"></slot>
    </div>
    <sherpa-button
      class="menu-button"
      data-type="icon"
      data-variant="tertiary"
      data-size="small"
      data-icon-start="&#xf142;"
      aria-label="Menu"
      data-tooltip="Menu"
    ></sherpa-button>
  </header>
  <div class="header-filters"><slot name="filters"></slot></div>
</template>
