<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sherpa-product-bar — Component Doc</title>
    <link rel="stylesheet" href="../../css/styles/sherpa-core.css" />
    <link rel="stylesheet" href="../../css/styles/themes/apex-2-core.css" />
    <link rel="stylesheet" href="../index.css" />
    <script type="module" src="../index.js"></script>
    <style>
      body { margin: 0; padding: 0; }
      .demo-group {
        margin-block-end: 32px;
      }
      h2 {
        margin: 24px 16px 12px;
      }
      .nav-link {
        display: inline-flex;
        align-items: center;
        padding: 12px 16px;
        color: rgba(255,255,255,0.7);
        text-decoration: none;
        font-size: 14px;
        height: 100%;
        box-sizing: border-box;
      }
      .nav-link:hover {
        color: #fff;
        background: rgba(255,255,255,0.08);
      }
      .nav-link.active {
        color: #fff;
        background: rgba(255,255,255,0.12);
        border-bottom: 2px solid #c046ff;
      }
    </style>
  </head>
  <body>
    <h2>Default with navigation</h2>
    <div class="demo-group">
      <sherpa-product-bar
        data-product-name="Classic Light"
        data-product-icon="fa-cube"
      >
        <i slot="icon" class="fa-solid fa-cube" style="font-size: 24px;"></i>
        <a href="#" class="nav-link active">Dashboard</a>
        <a href="#" class="nav-link">Reports</a>
        <a href="#" class="nav-link">Settings</a>
        <a href="#" class="nav-link">Support</a>
        <sherpa-button
          slot="actions"
          data-icon-start="fa-bell"
          data-variant="ghost"
          data-size="small"
          style="color: white;"
        ></sherpa-button>
        <sherpa-button
          slot="actions"
          data-icon-start="fa-user"
          data-variant="ghost"
          data-size="small"
          style="color: white;"
        ></sherpa-button>
      </sherpa-product-bar>
    </div>

    <h2>Minimal (name only)</h2>
    <div class="demo-group">
      <sherpa-product-bar data-product-name="Data Protection"></sherpa-product-bar>
    </div>

    <h2>With icon slot</h2>
    <div class="demo-group">
      <sherpa-product-bar data-product-name="Apex 2.0">
        <i slot="icon" class="fa-solid fa-shield-halved" style="font-size: 24px;"></i>
        <a href="#" class="nav-link">Overview</a>
        <a href="#" class="nav-link">Devices</a>
        <a href="#" class="nav-link">Policies</a>
      </sherpa-product-bar>
    </div>
  </body>
</html>
