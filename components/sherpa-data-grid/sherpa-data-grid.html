<!--
  sherpa-data-grid.html — Templates for sherpa-data-grid.

  Uses native <table> for correct sticky headers, full-width row backgrounds,
  and proper column alignment without flex-basis syncing.

  Templates:
    • default — Toolbar + scrollable table + pagination
    • (custom) — Consumers can add additional <template id="..."> blocks here
                  to define alternative grid layouts. Use the component's
                  `get templateId()` override to select a template by id.

  Host attributes:
    data-loading                — Loading state
    data-segment-field          — Column name to group rows by
    data-segment-mode           — "on" | "off" | "expanded" | "collapsed"
    data-sort-field             — Current sort column
    data-sort-direction         — "asc" | "desc"
    data-page                   — Current page (1-based)
    data-page-size              — Rows per page
    data-selectable             — "true" | "false" — show selection checkboxes
    data-show-actions           — "true" | "false" — show action column
    data-show-secondary-headers — "true" | "false" — show column search row
    data-show-pagination        — "true" | "false" — show pagination bar

  Inherited from ContentAttributesMixin:
    data-query-src, data-query-key, data-label, data-dataset,
    data-category, data-series, data-value-field, data-agg,
    data-measures, data-filters, data-order-by, data-limit,
    data-timerange, data-visible, data-show-status, data-unit,
    data-show-header, data-show-header-controls, data-show-view-menu

  Custom templates:
    To define a custom layout, add a new <template id="my-layout"> block
    below the default. Override `get templateId()` in a subclass or set it
    dynamically to select the template at render time.
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     DEFAULT — Toolbar + scrollable table + pagination
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="default">
  <!-- Toolbar -->
  <sherpa-toolbar class="grid-toolbar">
    <!-- Leading: consumer-provided primary action via slot -->
    <slot name="toolbar-leading" slot="leading"></slot>
    <sherpa-button
      class="actions-btn"
      slot="leading"
      data-type="button-menu"
      data-variant="secondary"
      data-label="Actions"
      data-menu-position="bottom-start"
    ></sherpa-button>

    <!-- Filters: embedded filter bar with group/sort/clear -->
    <sherpa-filter-bar data-embedded data-type="local" slot="filters">
      <sherpa-button slot="group" data-type="button-menu" data-split data-behavior="segment" data-label="Group" data-icon-start="&#xf5fd;" data-menu-scope="none"
        ></sherpa-button
      >
      <sherpa-button slot="sort" data-type="button-menu" data-split data-behavior="sort" data-label="Sort" data-icon-start="&#xf0dc;" data-menu-scope="none"
        ></sherpa-button
      >
      <sherpa-button
        slot="actions"
        data-variant="tertiary"
        data-size="small"
        data-action="clear"
        >Clear filter</sherpa-button
      >
    </sherpa-filter-bar>

    <!-- Trailing: search + column-select + export + overflow -->
    <div slot="trailing" class="toolbar-trailing">
      <sherpa-input-search
        class="global-search"
        placeholder="Search…"
        aria-label="Search all columns"
      >
      </sherpa-input-search>
      <sherpa-button
        class="column-select-btn"
        data-variant="secondary"
        data-icon-start="&#xf0db;"
        aria-label="Select columns"
        data-menu="true"
        data-menu-position="bottom-end"
        data-keep-compact
      >
      </sherpa-button>
      <sherpa-button
        class="export-btn"
        data-variant="secondary"
        data-icon-start="&#xf56d;"
        aria-label="Export"
        data-keep-compact
      >
      </sherpa-button>
      <sherpa-button
        class="overflow-menu-btn"
        data-variant="secondary"
        data-icon-start="&#xf142;"
        aria-label="Grid options"
        data-menu="true"
        data-menu-position="bottom-end"
        data-keep-compact
      >
      </sherpa-button>
    </div>
  </sherpa-toolbar>

  <!-- Scrollable table container -->
  <div class="table-container">
    <table role="grid">
      <thead>
        <tr class="primary-headers">
          <!-- Populated by JS: selection th + column th's + action th -->
        </tr>
        <tr class="secondary-headers">
          <!-- Populated by JS: per-column search inputs -->
        </tr>
      </thead>
      <tbody class="grid-body">
        <!-- Flat rows or grouped rows populated by JS -->
      </tbody>
    </table>
  </div>

  <!-- Data row — cloning template -->
  <template class="row-tpl">
    <tr class="grid-row" role="row">
      <td class="selection-cell">
        <input type="checkbox" class="sherpa-check row-check" aria-label="Select row" />
      </td>
      <!-- Data cells inserted by JS before action-cell -->
      <td class="action-cell">
        <sherpa-button
          class="row-action"
          data-variant="tertiary"
          data-size="small"
          data-icon-start="&#xf142;"
          aria-label="Row actions"
        ></sherpa-button>
      </td>
    </tr>
  </template>


  <!-- Group parent row — cloning template (class-only, bypasses SherpaElement parser) -->
  <template class="group-row-tpl">
    <tr class="group-parent-row">
      <td class="group-summary-cell">
        <div class="group-summary-inner">
          <div class="selection-cell">
            <input type="checkbox" class="sherpa-check group-check" />
          </div>
          <div class="group-toggle">
            <i
              class="fa-solid fa-chevron-right toggle-icon"
              aria-hidden="true"
            ></i>
          </div>
          <div class="group-content">
            <div class="group-heading">
              <span class="group-label"></span>
              <span class="group-count"></span>
            </div>
            <div class="group-metadata"></div>
          </div>
        </div>
      </td>
    </tr>
  </template>

  <!-- Cell cloning prototype: plain text cell -->
  <template class="cell-tpl">
    <td role="gridcell"></td>
  </template>

  <!-- Header cell — cloning prototype -->
  <template class="header-cell-tpl">
    <th class="header-cell" scope="col" role="columnheader" aria-sort="none">
      <div class="header-content">
        <span class="header-cell-label"></span>
        <i class="fa-solid sort-icon" aria-hidden="true">&#xf0dc;</i>
      </div>
    </th>
  </template>

  <!-- Search cell — cloning prototype -->
  <template class="search-cell-tpl">
    <th>
      <sherpa-input-search class="col-search" data-size="small" data-density="compact"></sherpa-input-search>
    </th>
  </template>

  <!-- Cell cloning prototype: link cell -->
  <template class="link-cell-tpl">
    <td role="gridcell"><a href="#"></a></td>
  </template>

  <!-- Cell cloning prototype: status cell (sherpa-tag) -->
  <template class="status-cell-tpl">
    <td role="gridcell"><sherpa-tag data-size="small"></sherpa-tag></td>
  </template>

  <!-- Cloning prototype: group metadata span -->
  <template class="metadata-span-tpl">
    <span></span>
  </template>

  <!-- Empty state -->
  <sherpa-empty-state class="empty-state"></sherpa-empty-state>

  <!-- Pagination -->
  <sherpa-pagination
    class="grid-pagination"
    part="pagination"
    data-page="1"
    data-page-size="25"
    data-allowed-sizes="10,25,50,100"
  >
  </sherpa-pagination>

  <!-- Filter-menu — cloned into a light-DOM <template data-menu> on connect -->
  <template id="filter-menu">
    <sherpa-menu-item
      data-selection="checkbox"
      data-event="toggle-filters"
    >Show / hide filters</sherpa-menu-item>
  </template>
</template>
