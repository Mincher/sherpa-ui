<!--
  sherpa-base-table.html — Data table component.

  Templates:
    • default — Header with filter chips + scrollable table area

  Host attributes:
    data-loading        — Loading state indicator
    data-segment-field  — Field name for segment grouping
    data-segment-mode   — Segment mode: "on" | "off"
    data-sort-field     — Field name for sorting
    data-sort-direction — "asc" | "desc"

  Inherited from ContentAttributesMixin:
    data-query-src, data-query-key, data-label, data-dataset,
    data-category, data-series, data-value-field, data-agg,
    data-measures, data-filters, data-order-by, data-limit,
    data-timerange, data-visible, data-show-status, data-unit,
    data-show-header, data-show-header-controls, data-show-view-menu
-->

<template id="default">
  <sherpa-header
    data-type="data-viz"
    data-show-header="false"
    data-show-header-controls="true"
    data-show-view-menu="true"
  >
  </sherpa-header>
  <div class="table-container">
    <table>
      <thead>
        <!-- Headers populated dynamically with th[scope="col"] -->
      </thead>
      <tbody>
        <!-- Rows populated dynamically with th[scope="row"] for first column -->
      </tbody>
      <tfoot>
        <!-- Footer populated dynamically with th[scope="row"] for label -->
      </tfoot>
    </table>
  </div>
  <p class="empty-state"></p>

  <!-- Menu heading — cloning template -->
  <template class="menu-heading-tpl">
    <sherpa-menu-item data-type="heading"></sherpa-menu-item>
  </template>

  <!-- Menu item — cloning template -->
  <template class="menu-item-tpl">
    <li><sherpa-menu-item></sherpa-menu-item></li>
  </template>
</template>
