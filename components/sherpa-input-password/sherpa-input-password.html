<!--
  sherpa-input-password.html — Password input with visibility toggle.

  Templates:
    • default — Password input + show/hide toggle button

  Inherited from AuxInputBase:
    data-label, data-description, data-helper, data-layout,
    disabled, readonly, required, name, value, placeholder,
    pattern, minlength, maxlength, novalidate
-->
<template id="default">
<div class="control-group">
  <input type="password" class="input-field" />
  <sherpa-button class="toggle-visibility input-action"
              data-variant="tertiary"
              data-icon-start="&#xf06e;"
              data-label="Show"
              aria-label="Toggle password visibility"></sherpa-button>
</div>
</template>
