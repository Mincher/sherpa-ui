<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>sherpa-input-date-range — Component Doc</title>
  <link rel="stylesheet" href="../../css/styles/sherpa-core.css" />
  <link rel="stylesheet" href="../../css/styles/sherpa-theme-apex-2.css" />
  <link rel="stylesheet" href="../index.css" />
  <script type="module" src="../index.js"></script>
  <style>
    .demo-grid {
      display: grid;
      gap: 40px;
      padding: 32px;
      max-width: 480px;
    }
    .demo-section h3 {
      margin: 0 0 12px;
      font: 600 14px/1.4 system-ui, sans-serif;
      color: #5c5c66;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="demo-grid">

    <!-- Basic date range -->
    <div class="demo-section">
      <h3>Date Range</h3>
      <sherpa-input-date-range
        data-label="Date Range"
        data-value-start="2025-01-01"
        data-value-end="2025-06-30"
      ></sherpa-input-date-range>
    </div>

    <!-- With min/max constraints -->
    <div class="demo-section">
      <h3>With Min/Max Constraints</h3>
      <sherpa-input-date-range
        data-label="Booking Period"
        data-description="Select check-in and check-out dates"
        min="2025-01-01"
        max="2025-12-31"
        data-helper="Dates must be within 2025"
      ></sherpa-input-date-range>
    </div>

    <!-- Disabled -->
    <div class="demo-section">
      <h3>Disabled</h3>
      <sherpa-input-date-range
        data-label="Disabled Range"
        data-value-start="2025-03-01"
        data-value-end="2025-03-31"
        disabled
      ></sherpa-input-date-range>
    </div>

    <!-- Required -->
    <div class="demo-section">
      <h3>Required</h3>
      <sherpa-input-date-range
        data-label="Required Date Range"
        required
      ></sherpa-input-date-range>
    </div>

  </div>

  <script>
    document.querySelectorAll('sherpa-input-date-range').forEach(el => {
      el.addEventListener('change', e => {
        console.log('change', e.detail);
      });
    });
  </script>
</body>
</html>
