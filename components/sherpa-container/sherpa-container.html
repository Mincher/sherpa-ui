<!--
  sherpa-container.html — Templates for sherpa-container.

  Shadow template:
    • shadow       — Shadow DOM structure: slots, resize handle, skeleton

  Light-DOM layout templates (stamped into the element's light DOM):
    • default      — Header + filter bar + metrics wrapper + sections wrapper
    • metrics-only — Header + metrics wrapper, no sections

  Host attributes:
    data-content   — Content template id
    data-title     — Container heading text
    description    — Container description
    template       — Layout template id
    data-col-span  — Column span: 3 | 6 | 9 | 12
    data-row-span  — Row span: 1–6
    data-menu-open — Menu state
    data-editable  — Edit mode (shows resize handles)
    data-loading   — Skeleton placeholder visible
-->

<!-- Shadow DOM: named slots + resize handle + skeleton + cloning prototypes -->
<template id="shadow">
  <slot name="header"></slot>
  <slot name="filters"></slot>
  <slot name="metrics"></slot>
  <slot name="sections"></slot>
  <slot name="extra"></slot>
  <div class="resize-handle"></div>
  <div class="container-skeleton">
    <div class="skel-header"></div>
    <div class="skel-metrics">
      <div class="skel-block"></div>
      <div class="skel-block"></div>
      <div class="skel-block"></div>
      <div class="skel-block"></div>
    </div>
    <div class="skel-body"></div>
  </div>
  <!-- Cloning prototype: section wrapper for dynamic content -->
  <template class="section-tpl">
    <div class="section">
      <div class="section-content"></div>
    </div>
  </template>
  <!-- Cloning prototype: menu toggle item -->
  <template class="menu-toggle-tpl">
    <li>
      <sherpa-menu-item
        data-selection="toggle"
        data-keep-open
      ></sherpa-menu-item>
    </li>
  </template>
</template>

<!-- Default: header + filter bar + metrics wrapper + sections wrapper -->
<template id="default">
  <sherpa-header
    data-type="container"
    slot="header"
    data-open-external="true"
    data-menu-button="true"
  ></sherpa-header>

  <sherpa-filter-bar slot="filters" data-embedded>
    <sherpa-filter-chip slot="group" data-type="segment"
      >Group</sherpa-filter-chip
    >
    <sherpa-filter-chip slot="sort" data-type="sort">Sort</sherpa-filter-chip>
    <sherpa-button
      slot="actions"
      data-variant="tertiary"
      data-size="small"
      data-action="clear"
      >Clear filter</sherpa-button
    >
  </sherpa-filter-bar>

  <div class="metrics" slot="metrics"></div>

  <div class="sections" slot="sections"></div>
</template>

<!-- Metrics-only: header + metrics wrapper, no sections -->
<template id="metrics-only">
  <sherpa-header
    data-type="container"
    slot="header"
    data-open-external="true"
    data-menu-button="true"
  ></sherpa-header>

  <div class="metrics" slot="metrics"></div>
</template>
