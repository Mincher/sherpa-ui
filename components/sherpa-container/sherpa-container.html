<!--
  sherpa-container.html — Shadow DOM templates for sherpa-container.

  Templates:
    • default — Full container: header, filter bar, metrics area, content slot.
    • (custom) — Consumers can add additional <template id="..."> blocks here
                  to define alternative container layouts. Use the component's
                  `get templateId()` override to select a template by id.

  Structure (default template):
    • sherpa-header         — Container heading with overflow menu
    • sherpa-filter-bar     — Embedded filter bar with group/sort/clear
    • .metrics-area         — Up to 4 sherpa-metric components (hidden when empty)
    • .content              — Default slot for consumer viz children

  Metric visibility:
    Metrics without a data-label attribute are hidden via CSS.
    For resizable containers, the visible count scales with data-col-span:
      3 cols → 1 metric, 6 → 2, 9 → 3, 12 → all 4.

  Host attributes:
    data-title       — Container heading text
    data-description — Container description
    data-variant     — Layout variant: "fit" (default), "resizable", "fill"
    data-col-span    — Column span: 3 | 6 | 9 | 12 (resizable variant only)
    data-row-span    — Row span: 1–6 (resizable variant only)
    data-menu-open   — Menu state
    data-editable    — Edit mode (resizable variant only)

  Slots:
    (default) — Consumer viz children (sherpa-data-viz wrappers)

  Custom templates:
    To define a custom layout, add a new <template id="my-layout"> block
    below the default. Override `get templateId()` in a subclass or set it
    dynamically to select the template at render time.

    Example usage:
      class MyContainer extends SherpaContainer {
        get templateId() { return 'metrics-only'; }
      }
-->

<!-- ═══════════════════════════════════════════════════════════════════════
     DEFAULT — Full container layout
     ═══════════════════════════════════════════════════════════════════════ -->
<template id="default">
  <sherpa-header
    data-type="container"
    data-open-external="true"
    data-menu-button="true"
  ></sherpa-header>

  <sherpa-filter-bar data-embedded>
    <sherpa-filter-chip slot="group" data-type="segment"
      >Group</sherpa-filter-chip
    >
    <sherpa-filter-chip slot="sort" data-type="sort">Sort</sherpa-filter-chip>
    <sherpa-button
      slot="actions"
      data-variant="tertiary"
      data-size="small"
      data-action="clear"
      >Clear filter</sherpa-button
    >
  </sherpa-filter-bar>

  <div class="metrics-area">
    <sherpa-metric></sherpa-metric>
    <sherpa-metric></sherpa-metric>
    <sherpa-metric></sherpa-metric>
    <sherpa-metric></sherpa-metric>
  </div>

  <div class="content">
    <slot></slot>
  </div>

  <!-- Cloning prototype: menu toggle item -->
  <template class="menu-toggle-tpl">
    <li>
      <sherpa-menu-item
        data-selection="toggle"
        data-keep-open
      ></sherpa-menu-item>
    </li>
  </template>
</template>

<!-- ═══════════════════════════════════════════════════════════════════════
     EXAMPLE CUSTOM TEMPLATE — Metrics-only (no filter bar or content slot)

     This is an example of a custom template. Consumers can add templates
     like this to provide alternative container layouts. Each template must
     have a unique id. The component selects a template via `get templateId()`.

     To use: override templateId in a subclass, or set it dynamically in
     the component's JS instance.
