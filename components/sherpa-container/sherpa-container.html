<!--
  sherpa-container.html — Slotted template: container layouts.
  Structure is defined by the consumer in view templates;
  data queries are loaded per-component via data-query-src/key.

  Templates:
    • default      — Header + metrics wrapper + sections wrapper
    • metrics-only — Header + metrics wrapper, no sections

  Host attributes:
    data-content   — Content template id
    data-title     — Container heading text
    description    — Container description
    template       — Layout template id
    data-col-span  — Column span: 3 | 6 | 9 | 12
    data-row-span  — Row span: 1–6
    data-menu-open — Menu state
    data-editable  — Edit mode (shows resize handles)
-->

<!-- Default: header + filter bar + metrics wrapper + sections wrapper -->
<template id="default">
  <sherpa-header data-type="container" slot="header" data-open-external="true" data-menu-button="true"></sherpa-header>

  <sherpa-filter-bar slot="filters" data-embedded>
    <sherpa-filter-chip slot="group" data-type="segment">Group</sherpa-filter-chip>
    <sherpa-filter-chip slot="sort" data-type="sort">Sort</sherpa-filter-chip>
    <sherpa-button slot="actions" data-variant="tertiary" data-size="small" data-action="clear">Clear filter</sherpa-button>
  </sherpa-filter-bar>

  <div class="metrics" slot="metrics"></div>

  <div class="sections" slot="sections"></div>
</template>

<!-- Metrics-only: header + metrics wrapper, no sections -->
<template id="metrics-only">
  <sherpa-header data-type="container" slot="header" data-open-external="true" data-menu-button="true"></sherpa-header>

  <div class="metrics" slot="metrics"></div>
</template>
