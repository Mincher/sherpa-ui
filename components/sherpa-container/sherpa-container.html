<!--
  sherpa-container.html — Templates for sherpa-container.

  Shadow template:
    • shadow       — Shadow DOM structure: named slots + cloning prototypes

  Light-DOM layout templates (stamped into the element's light DOM):
    • default      — Header + filter bar + content wrapper

  Host attributes:
    data-title     — Container heading text
    description    — Container description
    template       — Layout template id
    data-variant   — Layout variant: "fit" (default, hugs content),
                      "resizable" (grid-driven spans), "fill" (fills parent)
    data-col-span  — Column span: 3 | 6 | 9 | 12 (resizable variant only)
    data-row-span  — Row span: 1–6 (resizable variant only)
    data-menu-open — Menu state
    data-editable  — Edit mode (resizable variant only)
-->

<!-- Shadow DOM: named slots + cloning prototypes -->
<template id="shadow">
  <slot name="header"></slot>
  <slot name="filters"></slot>
  <slot name="content"></slot>
  <slot name="extra"></slot>
  <!-- Cloning prototype: menu toggle item -->
  <template class="menu-toggle-tpl">
    <li>
      <sherpa-menu-item
        data-selection="toggle"
        data-keep-open
      ></sherpa-menu-item>
    </li>
  </template>
</template>

<!-- Default: header + filter bar + content wrapper -->
<template id="default">
  <sherpa-header
    data-type="container"
    slot="header"
    data-open-external="true"
    data-menu-button="true"
  ></sherpa-header>

  <sherpa-filter-bar slot="filters" data-embedded>
    <sherpa-filter-chip slot="group" data-type="segment"
      >Group</sherpa-filter-chip
    >
    <sherpa-filter-chip slot="sort" data-type="sort">Sort</sherpa-filter-chip>
    <sherpa-button
      slot="actions"
      data-variant="tertiary"
      data-size="small"
      data-action="clear"
      >Clear filter</sherpa-button
    >
  </sherpa-filter-bar>

  <div class="content" slot="content"></div>
</template>
