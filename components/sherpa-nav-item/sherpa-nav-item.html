<!--
  sherpa-nav-item.html — Attribute-driven nav item (extends SherpaElement).

  Templates:
    • item (default) — Leaf navigation row: indicator, drag, icon, label, tag, chevron, delete
    • divider        — <li> separator with optional label

  The host element IS the interactive row (role + tabindex set in templates).
  Label text comes from the default <slot> (element's text content).

  Host attributes:
    data-variant       — "section" | "subsection" | "child" | (none for base)
    data-state         — "selected" | (absent for unselected)
    data-icon          — FontAwesome class string (e.g. "fa-solid fa-house")
    data-item-id       — Unique item identifier
    data-route         — Navigation route
    data-parent-name   — Parent section name
    data-editable      — Item is editable
    data-search-hidden — Hidden during search filtering
    data-nav-target    — Navigation target identifier
    data-badge         — Tag/badge label text
    data-badge-status  — Badge status (critical | info | success | warning | urgent | brand). Defaults to "success".
    data-has-badge     — Auto-managed: present when data-badge is set
    data-has-label     — Auto-managed by SherpaElement slot detection
-->

<template id="item">
  <div class="nav-item-indicator" part="indicator" aria-hidden="true"></div>
  <div class="nav-item-drag" part="drag" aria-hidden="true">
    <i class="fa-solid fa-grip-vertical sherpa-icon" data-size="xs" aria-hidden="true"></i>
  </div>
  <div class="nav-item-icon" part="icon">
    <span class="nav-item-icon-inner"><i class="sherpa-icon" data-size="xs" aria-hidden="true"></i></span>
    <span class="nav-item-dot" part="dot" aria-hidden="true"></span>
  </div>
  <span class="nav-item-label text-nav-item" part="label"><slot></slot></span>
  <sherpa-tag class="nav-item-tag" data-status="success" part="tag"></sherpa-tag>
  <span class="nav-item-chevron" part="chevron" aria-hidden="true">
    <i class="fa-solid fa-chevron-right sherpa-icon" data-size="2xs" aria-hidden="true"></i>
  </span>
  <button class="nav-item-delete" part="delete" type="button" aria-label="Remove from navigation">
    <i class="fa-solid fa-times sherpa-icon" data-size="xs" aria-hidden="true"></i>
  </button>
</template>

<template id="divider">
  <li class="nav-divider" role="separator">
    <span class="nav-divider-label"></span>
    <div class="nav-divider-line"></div>
  </li>
</template>

<!-- Promo — large CTA-style nav row with icon + heading + description -->
<template id="promo">
  <div class="nav-promo-icon" part="icon" aria-hidden="true">
    <i class="sherpa-icon" data-size="lg" aria-hidden="true"></i>
  </div>
  <div class="nav-promo-body">
    <span class="nav-promo-heading text-label" part="heading"><slot></slot></span>
    <span class="nav-promo-description text-body-xs" part="description"></span>
  </div>
  <span class="nav-promo-chevron" part="chevron" aria-hidden="true">
    <i class="fa-solid fa-arrow-right sherpa-icon" data-size="xs" aria-hidden="true"></i>
  </span>
</template>
