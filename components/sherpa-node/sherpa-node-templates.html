<!--
  sherpa-node-templates.html

  Library of <template class="rows-tpl" data-kind="…" data-subtype="…">
  blocks. Each template defines:
    • A <sherpa-node-header slot="header"> with kind-specific icon/title
      and any header sockets
    • Zero or more <sherpa-node-row> rows
    • Optional <sherpa-node-socket slot="footer-output"> for false-out

  These are loaded once via sherpa-node-templates.js and appended to
  every sherpa-node so its sub-type dropdown can swap layouts.
-->

<!-- ════════════════════════════════════════════════════════════════
     SOURCE
     ════════════════════════════════════════════════════════════════ -->

<template class="rows-tpl" data-kind="source" data-subtype="trigger">
  <sherpa-node-header slot="header">
    <span slot="title">Trigger</span>
    <sherpa-node-socket slot="output-socket" data-direction="out" data-port-name="out" data-status="true"></sherpa-node-socket>
  </sherpa-node-header>
  <sherpa-node-row>
    <span slot="helper">Starts the flow.</span>
  </sherpa-node-row>
</template>

<!-- ════════════════════════════════════════════════════════════════
     GROUP
     ════════════════════════════════════════════════════════════════ -->

<template class="rows-tpl" data-kind="group" data-subtype="default">
  <sherpa-node-header slot="header" data-icon="fa-solid fa-layer-group" data-drill-down>
    <span slot="title">Group</span>
    <sherpa-node-socket slot="input-socket" data-direction="in" data-port-name="in" data-multi></sherpa-node-socket>
    <sherpa-node-socket slot="output-socket" data-direction="out" data-port-name="out"></sherpa-node-socket>
  </sherpa-node-header>
  <sherpa-node-row>
    <span slot="helper">Click the open icon to edit the sub-graph.</span>
  </sherpa-node-row>
</template>
