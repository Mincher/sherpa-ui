<!--
  app-shell — Standard application shell layout.

  Provides the structural frame for a full-page application:
    • Sidebar navigation (sherpa-nav)
    • Main content area with view-header + optional global filter bar
    • Scrollable content viewport with responsive grid

  Components: sherpa-nav, sherpa-view-header, sherpa-filter-bar

  Customisation:
    • Add nav items to sherpa-nav (via data-src or light-DOM children)
    • Set data-label on sherpa-view-header for the page title
    • Add sherpa-container elements into <sherpa-layout-grid>
    • Add data-global to sherpa-filter-bar for global filtering
    • Set data-preset-filters on sherpa-filter-bar for auto-created presets

  Layout classes:
    .sherpa-app-layout        — Grid shell: sidebar nav + main area
    .sherpa-main-content      — Flex column for the main area
    .sherpa-view-header-group — Wrapper for view-header + global filter bar
    .sherpa-scroll-under      — Sticky header with scroll-activated bg + shadow
    .sherpa-main-content-slot — Scrollable viewport for the content grid
    <sherpa-layout-grid>      — Responsive 12-col grid
-->

<template id="app-shell"
  data-pattern-category="layouts"
  data-pattern-status="stable"
  data-pattern-components="sherpa-nav, sherpa-view-header, sherpa-filter-bar">

  <div class="sherpa-app-layout">
    <sherpa-nav data-pinned="false" data-editable data-searchable></sherpa-nav>

    <div class="sherpa-main-content">
      <header class="sherpa-view-header-group sherpa-scroll-under">
        <sherpa-view-header data-label=""></sherpa-view-header>
        <sherpa-filter-bar data-global></sherpa-filter-bar>
      </header>

      <div class="sherpa-main-content-slot">
        <sherpa-layout-grid></sherpa-layout-grid>
      </div>
    </div>
  </div>
</template>
