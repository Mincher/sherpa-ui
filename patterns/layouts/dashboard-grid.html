<!--
  dashboard-grid — Data dashboard with metric cards and visualization panels.

  Provides a 12-column responsive grid populated with data visualization
  containers. Each container has configurable column/row span and can hold
  charts, tables, or metrics.

  Components: sherpa-layout-grid, sherpa-container, sherpa-container-header,
              sherpa-metric, sherpa-barchart, sherpa-donut-chart, sherpa-data-grid

  Customisation:
    • Adjust data-col-span (3 | 6 | 9 | 12) and data-row-span (1–6) on each
      sherpa-container
    • Use sherpa-container-header for the title row
    • Populate containers with chart/grid/metric components

  Layout:
    <sherpa-layout-grid> — 12-col responsive grid (12 → 6 → 3 at breakpoints)
-->

<template id="dashboard-grid"
  data-pattern-category="layouts"
  data-pattern-status="stable"
  data-pattern-components="sherpa-layout-grid, sherpa-container, sherpa-container-header, sherpa-metric, sherpa-barchart, sherpa-donut-chart, sherpa-data-grid">

  <sherpa-layout-grid>

    <!-- Row 1: Metric cards -->
    <sherpa-container data-variant="resizable" data-col-span="3">
      <sherpa-container-header data-title="Total Items"></sherpa-container-header>
      <sherpa-metric></sherpa-metric>
    </sherpa-container>

    <sherpa-container data-variant="resizable" data-col-span="3">
      <sherpa-container-header data-title="Active"></sherpa-container-header>
      <sherpa-metric></sherpa-metric>
    </sherpa-container>

    <sherpa-container data-variant="resizable" data-col-span="3">
      <sherpa-container-header data-title="Pending"></sherpa-container-header>
      <sherpa-metric></sherpa-metric>
    </sherpa-container>

    <sherpa-container data-variant="resizable" data-col-span="3">
      <sherpa-container-header data-title="Resolved"></sherpa-container-header>
      <sherpa-metric></sherpa-metric>
    </sherpa-container>

    <!-- Row 2: Charts -->
    <sherpa-container data-variant="resizable" data-col-span="6" data-row-span="2">
      <sherpa-container-header data-title="Trend" data-menu-button="true"></sherpa-container-header>
      <sherpa-barchart></sherpa-barchart>
    </sherpa-container>

    <sherpa-container data-variant="resizable" data-col-span="6" data-row-span="2">
      <sherpa-container-header data-title="Distribution" data-menu-button="true"></sherpa-container-header>
      <sherpa-donut-chart></sherpa-donut-chart>
    </sherpa-container>

    <!-- Row 3: Detail table -->
    <sherpa-container data-variant="resizable" data-col-span="12" data-row-span="3">
      <sherpa-container-header data-title="Details" data-menu-button="true"></sherpa-container-header>
      <sherpa-data-grid></sherpa-data-grid>
    </sherpa-container>

  </sherpa-layout-grid>
</template>
