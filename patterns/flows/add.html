<!--
  add — Complete add-entity flow with dialog form and toast feedback.

  Provides the full lifecycle for creating a new entity:
    • Trigger button opens a dialog with a form
    • Form fields collect new entity data
    • Save dispatches flowcomplete + success toast
    • Cancel dispatches flowcancel and closes the dialog
    • Errors dispatch flowerror + critical toast

  Components: sherpa-button, sherpa-dialog, sherpa-input-text, sherpa-toast
  Utilities: FlowManager, FormManager, refreshDataset

  Lifecycle (managed by FlowManager — state in JS memory, not DOM):
    1. User clicks trigger → app calls form.clear() then flow.startAdd()
    2. FlowManager dispatches flowstart, opens dialog, sets labels
    3. User fills form fields
    4. User clicks Save → FlowManager calls onSave() callback
    5a. Success → FlowManager dispatches flowcomplete + SherpaToast.success()
    5b. Failure → FlowManager dispatches flowerror + SherpaToast.critical()
    6. Cancel → FlowManager dispatches flowcancel, closes dialog

  Events (all bubbles: true, composed: true — dispatched by FlowManager):
    flowstart   — {flow: "add", entity: string}
    flowprogress — {flow: "add", entity: string}
    flowcomplete — {flow: "add", entity: string, data: object}
    flowcancel   — {flow: "add", entity: string}
    flowerror    — {flow: "add", entity: string, error: string}

  Setup script:
    import { FlowManager } from 'sherpa-ui/components/utilities/flow-manager.js';
    import { FormManager } from 'sherpa-ui/components/utilities/form-manager.js';
    import { refreshDataset } from 'sherpa-ui/components/utilities/grid-refresh.js';

    const dialog = document.getElementById('entity-dialog');
    const form = new FormManager(dialog);
    const flow = new FlowManager({
      entity: 'entity',
      contentArea,
      dialogs: { addEdit: dialog },
      async onSave(editingRecord, flowType) {
        const values = form.read();
        const missing = form.validate();
        if (missing.length) throw new Error('Please fill in all required fields.');
        // Call API here, return saved record
        return values;
      },
      onRefresh: () => refreshDataset(contentArea, loader),
    });

    addBtn.addEventListener('buttonclick', () => { form.clear(); flow.startAdd(); });

  Backdrop: native ::backdrop on <dialog> — no custom shim needed.
  See also: patterns/layouts/list-view.html (Add button trigger)
-->

<template id="add"
  data-pattern-category="flows"
  data-pattern-status="stable"
  data-pattern-components="sherpa-button, sherpa-dialog, sherpa-input-text, sherpa-toast">

  <!-- Trigger — typically placed in a toolbar or view header -->
  <sherpa-button
    data-label="Add"
    data-variant="primary"
    data-icon-start="&#xf067;">
  </sherpa-button>

  <!-- Dialog — opens on flowstart, contains form for new entity -->
  <sherpa-dialog data-label="Add Entity" data-size="medium" data-dismissible>

    <!-- Form fields — replace with actual entity fields -->
    <sherpa-input-text data-label="Name" name="name" required placeholder="Enter name"></sherpa-input-text>
    <sherpa-input-text data-label="Description" name="description" placeholder="Enter description"></sherpa-input-text>

    <!-- Actions — Save triggers flowprogress → API → flowcomplete/flowerror -->
    <sherpa-button slot="footer" data-label="Cancel" data-variant="secondary"></sherpa-button>
    <sherpa-button slot="footer" data-label="Save" data-variant="primary"></sherpa-button>
  </sherpa-dialog>

  <!--
    Toast feedback (programmatic — not in DOM):
      SherpaToast.success("Entity created successfully")
      SherpaToast.critical("Failed to create entity")
  -->
</template>
