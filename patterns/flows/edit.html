<!--
  edit — Complete edit-entity flow with pre-populated dialog form and toast feedback.

  Provides the full lifecycle for editing an existing entity:
    • Trigger button (row action or toolbar) opens a dialog pre-filled with current values
    • Form fields allow modifying entity data
    • Save dispatches flow-complete + success toast
    • Cancel dispatches flow-cancel and closes the dialog
    • Errors dispatch flow-error + critical toast

  Components: sherpa-button, sherpa-dialog, sherpa-input-text, sherpa-toast
  Utilities: FlowManager, FormManager, refreshDataset

  Lifecycle (managed by FlowManager — state in JS memory, not DOM):
    1. User clicks edit trigger on a row or toolbar
    2. App calls form.populate(record) then flow.startEdit(record)
    3. FlowManager dispatches flow-start, opens dialog, sets labels
    4. User modifies fields
    5. User clicks Save → FlowManager calls onSave(editingRecord, 'edit')
    6a. Success → FlowManager dispatches flow-complete + SherpaToast.success()
    6b. Failure → FlowManager dispatches flow-error + SherpaToast.critical()
    7. Cancel → FlowManager dispatches flow-cancel, closes dialog

  Events (all bubbles: true, composed: true — dispatched by FlowManager):
    flow-start    — {flow: "edit", entity: string, data: object}
    flow-progress — {flow: "edit", entity: string}
    flow-complete — {flow: "edit", entity: string, data: object}
    flow-cancel   — {flow: "edit", entity: string}
    flow-error    — {flow: "edit", entity: string, error: string}

  Pre-population: Use FormManager.populate(record) — sets each named field's
  value from the record object automatically.

  Setup script:
    import { FlowManager } from 'sherpa-ui/components/utilities/flow-manager.js';
    import { FormManager } from 'sherpa-ui/components/utilities/form-manager.js';

    const dialog = document.getElementById('entity-dialog');
    const form = new FormManager(dialog);
    const flow = new FlowManager({
      entity: 'entity',
      contentArea,
      dialogs: { addEdit: dialog },
      async onSave(editingRecord, flowType) {
        const values = form.read();
        // Call API here, return updated record
        return values;
      },
      onRefresh: () => refreshDataset(contentArea, loader),
    });

    grid.addEventListener('row-action', (e) => {
      const record = e.detail?.rowData;
      form.populate(record);
      flow.startEdit(record);
    });

  Backdrop: native ::backdrop on <dialog> — no custom shim needed.
-->

<template id="edit"
  data-pattern-category="flows"
  data-pattern-status="stable"
  data-pattern-components="sherpa-button, sherpa-dialog, sherpa-input-text, sherpa-toast">

  <!-- Trigger — typically a row action button or toolbar edit button -->
  <sherpa-button
    data-label="Edit"
    data-variant="secondary"
    data-icon-start="&#xf044;">
  </sherpa-button>

  <!-- Dialog — opens on flow-start, pre-populated with existing values -->
  <sherpa-dialog data-label="Edit Entity" data-size="medium" data-dismissible>

    <!-- Form fields — pre-populated by app JS from existing record -->
    <sherpa-input-text data-label="Name" name="name" required placeholder="Enter name"></sherpa-input-text>
    <sherpa-input-text data-label="Description" name="description" placeholder="Enter description"></sherpa-input-text>

    <!-- Actions — Save triggers flow-progress → API → flow-complete/flow-error -->
    <sherpa-button slot="footer" data-label="Cancel" data-variant="secondary"></sherpa-button>
    <sherpa-button slot="footer" data-label="Save" data-variant="primary"></sherpa-button>
  </sherpa-dialog>

  <!--
    Toast feedback (programmatic — not in DOM):
      SherpaToast.success("Entity updated successfully")
      SherpaToast.critical("Failed to update entity")
  -->
</template>
